<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Hub — Dashboard Projet</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes/pmhub-theme.css">
<script src="pmhub-data.js"></script>
<script src="pmhub-nav-context.js"></script>
<script src="pmhub-sidebar.js"></script>
<script src="pmhub-mini-chat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;height:100%;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(212,175,100,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,100,0.02) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);background:rgba(6,10,13,0.92);backdrop-filter:blur(24px);}
.nav-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.22em;color:var(--accent);text-transform:uppercase;}
.nav-links{display:flex;gap:6px;align-items:center;}
.nav-links a{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;padding:7px 13px;border-radius:5px;transition:all .2s;}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.nav-links a.active{color:var(--accent);background:rgba(99,210,180,0.07);}
.layout{display:grid;grid-template-columns:260px 1fr;grid-template-rows:1fr;height:calc(100vh - 65px);margin-top:65px;overflow:hidden;}
.sidebar{height:100%;overflow-y:auto;border-right:1px solid var(--border);padding:24px 0;background:rgba(12,17,24,0.7);}
.main-col{display:flex;flex-direction:column;height:100%;min-height:0;overflow:hidden;}
.sb-section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);padding:0 20px 8px;margin-top:8px;}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 20px;cursor:pointer;transition:all .18s;border-left:2px solid transparent;font-size:12px;font-weight:600;color:var(--text-soft);text-decoration:none;}
.sb-item:hover{background:rgba(99,210,180,0.04);color:var(--text);border-left-color:rgba(99,210,180,0.2);}
.sb-item.active{background:rgba(99,210,180,0.07);color:var(--accent);border-left-color:var(--accent);}
.sb-item-icon{font-size:15px;width:18px;text-align:center;}
.main{flex:1;min-height:0;overflow-y:auto;padding:40px 48px;padding-bottom:90px;position:relative;z-index:1;}

/* PROJECT HEADER */
.proj-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:24px;margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid var(--border);}
.proj-header-left{display:flex;align-items:flex-start;gap:20px;}
.proj-icon-wrap{width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--surface2);border:1px solid var(--border);flex-shrink:0;}
.proj-meta{}
.proj-ref{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
.proj-name{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;line-height:1.1;letter-spacing:-0.02em;margin-bottom:10px;}
.proj-type{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:14px;}
.proj-progress-wrap{max-width:320px;}
.proj-progress-header{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:8px;}
.proj-progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.proj-progress-fill{height:100%;border-radius:3px;transition:width 1s ease;}
.proj-header-actions{display:flex;gap:10px;flex-wrap:wrap;}
.proj-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:6px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;text-decoration:none;transition:all .2s;border:1px solid var(--border);background:var(--surface);color:var(--text);}
.proj-btn:hover{border-color:var(--accent);color:var(--accent);}
.proj-btn.primary{background:var(--accent);color:#060a0d;border-color:var(--accent);}
.proj-btn.primary:hover{opacity:0.9;}
.status-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;padding:5px 12px;border-radius:20px;}
.status-badge.active{background:rgba(99,210,180,0.1);color:var(--success);border:1px solid rgba(99,210,180,0.25);}
.status-badge.hold{background:rgba(232,201,122,0.1);color:var(--warning);border:1px solid rgba(232,201,122,0.25);}
.status-badge.closed{background:rgba(107,120,133,0.1);color:var(--text-muted);border:1px solid rgba(107,120,133,0.25);}
.status-badge.risk{background:rgba(224,112,112,0.1);color:var(--danger);border:1px solid rgba(224,112,112,0.25);}

/* HEALTH RAG BADGE */
.health-rag-badge { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.08em; padding:5px 12px; border-radius:20px; font-weight:600; }
.health-rag-badge.rag-green { background:rgba(34,197,94,.12); color:var(--success); border:1px solid rgba(34,197,94,.25); }
.health-rag-badge.rag-amber { background:rgba(245,158,11,.12); color:var(--warning); border:1px solid rgba(245,158,11,.25); }
.health-rag-badge.rag-red   { background:rgba(239,68,68,.12);  color:var(--danger);  border:1px solid rgba(239,68,68,.25); }

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:32px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px 24px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.g::before{background:var(--accent);}
.kpi.b::before{background:var(--accent3);}
.kpi.y::before{background:var(--accent2);}
.kpi.r::before{background:var(--danger);}
.kpi-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.kpi-val{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;line-height:1;}
.kpi.g .kpi-val{color:var(--accent);}
.kpi.b .kpi-val{color:var(--accent3);}
.kpi.y .kpi-val{color:var(--accent2);}
.kpi.r .kpi-val{color:var(--danger);}
.kpi-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:6px;}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;}
.chart-card-header{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.chart-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.chart-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}

/* DONUT AVANCEMENT */
.donut-avancement{display:flex;align-items:center;gap:28px;}
.donut-svg{flex-shrink:0;}
.donut-center{text-align:center;}
.donut-center .val{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;}
.donut-center .lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}

/* RAID LIST */
.raid-list{display:flex;flex-direction:column;gap:0;}
.raid-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px;}
.raid-row:last-child{border-bottom:none;}
.raid-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.raid-dot.r{background:var(--danger);}
.raid-dot.a{background:var(--accent3);}
.raid-dot.i{background:var(--accent2);}
.raid-dot.d{background:var(--accent);}
.raid-text{flex:1;}
.raid-more{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);margin-top:12px;}
.raid-more a{color:var(--accent);text-decoration:none;}
.raid-more a:hover{text-decoration:underline;}

/* TEAM */
.team-list{display:flex;flex-direction:column;gap:12px;}
.team-item{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
.team-item-left{display:flex;align-items:center;gap:14px;flex:1;}
.team-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;flex-shrink:0;}
.team-name{font-weight:600;font-size:13px;}
.team-role{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
.team-item-actions{flex-shrink:0;}
.btn-remove-res{padding:6px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;}
.btn-remove-res:hover{border-color:var(--danger);color:var(--danger);}
.add-resource-wrap{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.add-resource-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:1px dashed var(--accent);background:rgba(99,210,180,0.06);color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
.add-resource-btn:hover{background:rgba(99,210,180,0.12);}
.add-resource-modal .modal{max-width:400px;}
.add-resource-modal .res-pick-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
.add-resource-modal .res-pick-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;}
.add-resource-modal .res-pick-item:hover{border-color:var(--accent);background:rgba(99,210,180,0.06);}
.add-resource-modal .res-pick-item .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.add-resource-modal .res-pick-item .name{font-weight:600;font-size:13px;}
.add-resource-modal .res-pick-item .role{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}

/* MILESTONES */
.ms-list{display:flex;flex-direction:column;gap:0;}
.ms-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.ms-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ms-dot.critical{background:var(--danger);}
.ms-dot.normal{background:var(--accent3);}
.ms-label{flex:1;font-size:12px;font-weight:600;}
.ms-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}

/* QUICK LINKS */
.quick-links{display:flex;flex-wrap:wrap;gap:10px;}
.quick-link{display:flex;align-items:center;gap:8px;padding:12px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;text-decoration:none;color:var(--text-soft);font-size:13px;font-weight:600;transition:all .2s;}
.quick-link:hover{border-color:var(--accent);color:var(--accent);}

/* SUMMARY BOX */
.summary-box{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-soft);line-height:1.75;}

.ai-float-btn{position:fixed;bottom:28px;right:28px;z-index:350;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#4cbda0);color:#060a0d;font-size:24px;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 8px 28px rgba(99,210,180,0.35);border:1px solid rgba(99,210,180,0.4);transition:transform .2s;}
.ai-float-btn:hover{transform:scale(1.08);}
@media(max-width:960px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .kpi-strip{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}
  .proj-name{font-size:32px;}
}
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><a href="pm-hub.html" style="color:inherit;text-decoration:none;">PM Hub</a></div>
  <div class="nav-context" id="nav-context"></div>
  <div class="nav-links">
    <a href="#" class="nav-cta" onclick="window.location.href='pm-hub.html'; return false;">+ Nouveau projet</a>
    <a href="pm-hub-settings.html" class="nav-icon" title="Paramètres">⚙</a>
  </div>
</nav>
<a href="#" class="ai-float-btn" id="aiFloatBtn" title="Assistant IA">🤖</a>
<div class="layout">
  <aside class="sidebar" id="pmhub-sidebar"></aside>
  <div class="main-col">
    <main class="main">
      <div id="projectContent"></div>
    </main>
  </div>
</div>

<!-- Modal Ajouter une ressource au projet -->
<div class="modal-overlay add-resource-modal" id="addResourceModalOverlay" onclick="if(event.target===this)closeAddResourceModal()">
  <div class="modal">
    <div class="modal-strip"></div>
    <div class="modal-header">
      <div class="modal-title">Ajouter une ressource au projet</div>
      <button class="modal-close" onclick="closeAddResourceModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">Choisissez un membre à ajouter à l'équipe du projet.</p>
      <div class="res-pick-list" id="addResourceList"></div>
    </div>
  </div>
</div>

<script>
// Allouer / retirer des ressources au projet (appelées depuis le HTML généré)
function removeResourceFromProject(projectId, resId) {
  const p = PMHUB.getProjectById(projectId);
  if (!p) return;
  const team = (p.team || []).filter(id => id !== resId);
  PMHUB.updateProject(parseInt(projectId, 10), { team });
  initProjectDashboard();
}
function openAddResourceModal(projectId) {
  window._addResProjectId = projectId;
  const p = PMHUB.getProjectById(projectId);
  const allRes = PMHUB.getResources();
  const teamIds = p && p.team ? p.team : [];
  const available = allRes.filter(r => !teamIds.includes(r.id));
  const listEl = document.getElementById('addResourceList');
  const overlay = document.getElementById('addResourceModalOverlay');
  if (!listEl || !overlay) return;
  if (!available.length) {
    listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">Toutes les ressources sont déjà sur ce projet.</div>';
  } else {
    listEl.innerHTML = available.map(r => `
      <div class="res-pick-item" onclick="addResourceToProject('${projectId}','${(r.id||'').replace(/'/g,"\\'")}')">
        <div class="avatar" style="background:${(r.color||'#63d2b4')}33;color:${r.color||'#63d2b4'};border:2px solid ${(r.color||'#63d2b4')}44;">${r.id}</div>
        <div>
          <div class="name">${(r.name||'').replace(/</g,'&lt;')}</div>
          <div class="role">${(r.role||'').replace(/</g,'&lt;')}</div>
        </div>
      </div>
    `).join('');
  }
  overlay.classList.add('open');
}
function addResourceToProject(projectId, resId) {
  const p = PMHUB.getProjectById(projectId);
  if (!p) return;
  const team = [...(p.team || []), resId];
  PMHUB.updateProject(parseInt(projectId, 10), { team });
  document.getElementById('addResourceModalOverlay').classList.remove('open');
  initProjectDashboard();
}
function closeAddResourceModal() {
  document.getElementById('addResourceModalOverlay').classList.remove('open');
}

function initProjectDashboard() {
  try {
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }
    const projectId = getParam('project');
    const projectContentEl = document.getElementById('projectContent');
    if (!projectContentEl) return;
    if (!projectId) {
      const projs = PMHUB.getProjects().filter(p => p.status !== 'archived');
      projectContentEl.innerHTML = `
        <div style="max-width:540px;margin:60px auto;text-align:center;">
          <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;margin-bottom:16px;">Aucun projet sélectionné</div>
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;margin-bottom:8px;">Choisissez un projet</h2>
          <p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:28px;">Sélectionnez un projet pour afficher son tableau de bord.</p>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${projs.map(p => `<a href="pm-hub-project.html?project=${encodeURIComponent(p.id)}" style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);transition:border-color .2s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><span style="font-size:22px;">${p.icon||'📁'}</span><div style="flex:1;text-align:left;"><div style="font-weight:700;font-size:14px;">${p.name}</div><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);margin-top:2px;">${p.ref} · ${p.status}</div></div><span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);">${p.progress||0}%</span></a>`).join('')}
            ${projs.length === 0 ? '<p style="color:var(--text-muted);font-family:DM Mono,monospace;font-size:11px;">Aucun projet actif. <a href="pm-hub-wizard.html" style="color:var(--accent);">Créez votre premier projet →</a></p>' : ''}
          </div>
          <a href="pm-hub.html" style="display:inline-block;margin-top:20px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);text-decoration:none;">← Retour au portfolio</a>
        </div>
      `;
      return;
    }
    const project = PMHUB.getProjectById(projectId);
    if (!project) {
      projectContentEl.innerHTML = '<div class="wiz-card" style="text-align:center;padding:48px;"><p style="margin-bottom:16px;">Projet introuvable.</p><a href="pm-hub.html" class="proj-btn primary">Retour au dashboard</a></div>';
      return;
    }

    const raids = PMHUB.getRaids(projectId);
    const resources = PMHUB.getResources();
    const budgetData = PMHUB.getBudget && PMHUB.getBudget(projectId);
    const statusLabel = { active:'En cours', hold:'En attente', closed:'Clôturé', risk:'À risque' };
    const statusClass = { active:'active', hold:'hold', closed:'closed', risk:'risk' };

    function formatDate(d) {
      if (!d) return '—';
      const [y,m,day] = d.split('-');
      const M = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
      return day + ' ' + M[parseInt(m)-1] + ' ' + y;
    }

    const progress = project.progress || 0;
    const progressColor = project.status === 'risk' ? 'var(--danger)' : project.status === 'closed' ? 'var(--text-muted)' : 'var(--accent)';

    const teamIds = project.team || [];
    const teamMembers = teamIds.map(id => resources.find(r => r.id === id)).filter(Boolean);
    if (teamMembers.length === 0 && teamIds.length) {
      teamIds.forEach(id => teamMembers.push({ id, name: id, role: 'Membre équipe', color: project.color || 'var(--accent)' }));
    }

    const raidUrl = 'pm-hub-raid.html?project=' + projectId;
    const ganttUrl = 'pm-hub-gantt.html?project=' + projectId;
    const templatesUrl = 'pm-hub-templates.html?project=' + projectId;
    const wizardUrl = 'pm-hub-wizard.html?project=' + projectId;

    var sbProjName = document.getElementById('sbProjName');
    var sbProjNameText = document.getElementById('sbProjNameText');
    if (sbProjName) sbProjName.href = 'pm-hub-project.html?project=' + projectId;
    if (sbProjNameText) sbProjNameText.textContent = project.name.length > 20 ? project.name.slice(0,19) + '…' : project.name;
    const ab = document.getElementById('aiFloatBtn');
    if (ab) ab.href = 'pm-hub-ai.html?from=Dashboard%20projet&project=' + projectId;

    // Health
    const health = PMHUB.getProjectHealth ? PMHUB.getProjectHealth(projectId) : { score: 0, rag: 'amber', openRisks: 0 };

    // Days left
    const today = new Date(); today.setHours(0,0,0,0);
    const endDate = project.end ? new Date(project.end) : null;
    const daysLeft = endDate ? Math.round((endDate - today) / 86400000) : null;

    // Critical risks
    const criticalRisks = (raids.risks||[]).filter(r => r.severity === 'critical' && r.status !== 'closed').length;

    // Budget
    const budgetPlanned = budgetData && budgetData.planned ? Number(budgetData.planned) : 0;
    const budgetConsumed = budgetData && budgetData.consumed ? Number(budgetData.consumed) : 0;
    const budgetPct = budgetPlanned > 0 ? Math.min(100, Math.round((budgetConsumed / budgetPlanned) * 100)) : (project.budget ? '—' : 0);
    const budgetConsumedStr = budgetPlanned > 0 ? budgetConsumed.toLocaleString('fr-FR') + ' / ' + budgetPlanned.toLocaleString('fr-FR') + ' ' + (budgetData.currency || '€') : (project.budget || 'Non renseigné');
    const budgetCardSub = budgetPlanned > 0 ? `${budgetPct}% consommé · ${(budgetPlanned - budgetConsumed).toLocaleString('fr-FR')} ${budgetData.currency||'€'} restant` : 'Budget non détaillé';

    // RAID total
    const raidTotal = (raids.risks||[]).length + (raids.actions||[]).length + (raids.issues||[]).length + (raids.decisions||[]).length;

    // RAID chart (horizontal bars)
    const raidSections = [

          </div>

    })();

    // Recent RAID items with badge
    const recentRaidItems = [

      ...(raids.actions||[]).slice(0,2).map(a=>({ type:'a', label:a.desc||a.title||'Action', badge:a.status||'' })),

    // Gouvernance
    const gouvernanceRows = [

      { label: 'Type', val: project.type },
    ].filter(r => r.val && r.val !== '');
    const gouvernanceHtml = gouvernanceRows.length ? gouvernanceRows.map((r,i,a) =>
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;' + (i<a.length-1?'border-bottom:1px solid rgba(255,255,255,0.05)':'') + '">' +

    const constraints = Array.isArray(scope.constraints) ? scope.constraints : (scope.constraints ? [scope.constraints] : []);

    const regularTasks = ganttTasks.filter(t => !(t.milestone || t.is_milestone || t.type === 'milestone'));
    const doneTasks = regularTasks.filter(t => (t.progress||0) >= 100 || t.status === 'done' || t.status === 'completed');
    const inProgressTasks = regularTasks.filter(t => (t.progress||0) > 0 && (t.progress||0) < 100);
    const notStartedTasks = regularTasks.filter(t => (t.progress||0) === 0 && t.status !== 'done' && t.status !== 'completed');

    const milestonesHtml = milestones.length ? milestones.slice(0,6).map(m => {
      const mDate = m.end ? new Date(m.end) : (m.start ? new Date(m.start) : null);
      const isPast = mDate && mDate < today;
      const isDone = (m.progress||0) >= 100 || m.status === 'done' || m.status === 'completed';
      const isOverdueM = isPast && !isDone;
      const mIcon = isDone ? '✅' : isOverdueM ? '🔴' : '🔵';
      const mColor = isDone ? 'var(--success)' : isOverdueM ? 'var(--danger)' : 'var(--accent3)';
      const mDateStr = mDate ? mDate.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}) : '—';
      return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);">' +
        '<span style="font-size:15px;flex-shrink:0;">' + mIcon + '</span>' +
        '<div style="flex:1;"><div style="font-size:12px;font-weight:600;">' + (m.name||m.text||'Jalon').replace(/</g,'&lt;') + '</div>' +
        (m.phase ? '<div style="font-family:DM Mono,monospace;font-size:9px;color:var(--text-muted);">Phase : '+m.phase+'</div>' : '') + '</div>' +
        '<div style="text-align:right;flex-shrink:0;"><div style="font-family:\'DM Mono\',monospace;font-size:10px;color:' + mColor + ';">' + mDateStr + '</div>' +
        (isOverdueM ? '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--danger);">En retard</div>' : '') + '</div></div>';
    }).join('') :
      '<div style="text-align:center;padding:28px 0;font-family:\'DM Mono\',monospace;font-size:11px;color:var(--text-muted);"><div style="font-size:28px;margin-bottom:10px;">🏁</div><div>Aucun jalon défini</div><a href="' + ganttUrl + '" style="color:var(--accent);font-size:10px;display:block;margin-top:8px;">Créer des jalons dans le Gantt →</a></div>';

    const taskBreakdownHtml = regularTasks.length ?
      '<div style="display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;">' +
      '<div style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;text-align:center;">' +
        '<div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:600;color:var(--success);">' + doneTasks.length + '</div>' +
        '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--text-muted);">Terminées</div></div>' +
      '<div style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;text-align:center;">' +
        '<div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:600;color:var(--accent3);">' + inProgressTasks.length + '</div>' +
        '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--text-muted);">En cours</div></div>' +
      '<div style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;text-align:center;">' +
        '<div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:600;color:var(--text-muted);">' + notStartedTasks.length + '</div>' +
        '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--text-muted);">À démarrer</div></div>' +
      '<div style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;text-align:center;">' +
        '<div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:600;color:var(--accent);">' + regularTasks.length + '</div>' +
        '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--text-muted);">Total</div></div>' +
      '</div>' : '';

    // Open actions (sorted by due date)
    const openActions = (raids.actions||[])
      .filter(a => a.status !== 'closed' && a.status !== 'done' && a.status !== 'completed')
      .sort((a,b) => { if (!a.dueDate && !b.dueDate) return 0; if (!a.dueDate) return 1; if (!b.dueDate) return -1; return new Date(a.dueDate) - new Date(b.dueDate); })
      .slice(0,6);
    const openActionsHtml = openActions.length ? openActions.map(a => {
      const dDate = a.dueDate ? new Date(a.dueDate) : null;
      const isOverdueA = dDate && dDate < today;
      const dStr = dDate ? dDate.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '—';
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);">' +
        '<span style="width:8px;height:8px;border-radius:50%;background:' + (isOverdueA?'var(--danger)':'var(--accent2)') + ';flex-shrink:0;display:inline-block;"></span>' +
        '<div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + (a.desc||a.title||'Action').replace(/</g,'&lt;').slice(0,70) + '</div>' +
        (a.owner ? '<div style="font-family:DM Mono,monospace;font-size:9px;color:var(--text-muted);">👤 '+String(a.owner).replace(/</g,'&lt;')+'</div>' : '') + '</div>' +
        '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:' + (isOverdueA?'var(--danger)':'var(--text-muted)') + ';flex-shrink:0;white-space:nowrap;">' + (isOverdueA?'⚠ ':'') + dStr + '</div></div>';
    }).join('') :
      '<div style="text-align:center;padding:28px 0;font-family:\'DM Mono\',monospace;font-size:11px;color:var(--text-muted);"><div style="font-size:28px;margin-bottom:10px;">✅</div><div>Aucune action en cours</div></div>';

    // ── SVG chart helpers ──────────────────────────────────────
    function mkDonut(pct, color, size, sw) {
      size = size||82; sw = sw||8;
      var r = (size-sw*2)/2, cx = size/2, cy = size/2;
      var circ = 2*Math.PI*r, fill = (Math.min(100,Math.max(0,pct))/100)*circ;
      return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">' +
        '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="'+sw+'"/>' +
        '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" ' +
        'stroke-dasharray="'+fill.toFixed(1)+' '+circ.toFixed(1)+'" stroke-linecap="round" ' +
        'transform="rotate(-90 '+cx+' '+cy+')"/></svg>';
    }
    function mkGauge(score, color) {
      var r=38, cx=50, cy=50, arcLen=Math.PI*r;
      var fill = (Math.min(100,Math.max(0,score))/100)*arcLen;
      return '<svg width="100" height="58" viewBox="0 0 100 58">' +
        '<path d="M '+(cx-r)+' '+cy+' A '+r+' '+r+' 0 0 1 '+(cx+r)+' '+cy+'" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="9" stroke-linecap="round"/>' +
        '<path d="M '+(cx-r)+' '+cy+' A '+r+' '+r+' 0 0 1 '+(cx+r)+' '+cy+'" fill="none" stroke="'+color+'" stroke-width="9" stroke-linecap="round" ' +
        'stroke-dasharray="'+fill.toFixed(1)+' '+arcLen.toFixed(1)+'"/></svg>';
    }
    function mkPieDonut(segs, size) {
      size = size||90; var r=size*0.38, ri=r*0.54, cx=size/2, cy=size/2;
      var total = segs.reduce(function(s,g){return s+(g.v||0);},0)||1;
      var angle = -Math.PI/2, paths='';
      segs.forEach(function(seg){
        if(!seg.v) return;
        var sa=(seg.v/total)*2*Math.PI;
        var x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
        var ix1=cx+ri*Math.cos(angle), iy1=cy+ri*Math.sin(angle);
        angle+=sa;
        var x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
        var ix2=cx+ri*Math.cos(angle), iy2=cy+ri*Math.sin(angle);
        var la=sa>Math.PI?1:0;
        paths+='<path d="M '+x1.toFixed(1)+' '+y1.toFixed(1)+' A '+r+' '+r+' 0 '+la+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)+' L '+ix2.toFixed(1)+' '+iy2.toFixed(1)+' A '+ri+' '+ri+' 0 '+la+' 0 '+ix1.toFixed(1)+' '+iy1.toFixed(1)+' Z" fill="'+seg.c+'"/>';
      });
      if(!paths) paths='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-1)+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="'+(r-ri)+'"/>';
      return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'</svg>';
    }

    // Pre-computed visual charts

<div class="proj-header">
  <div class="proj-header-left">
    <div class="proj-icon-wrap" style="background:${project.color||'var(--accent)'}18;border-color:${project.color||'var(--accent)'}33;">${project.icon||'📁'}</div>
    <div class="proj-meta">
      <div class="proj-ref">${project.ref} · ${project.type}${project.methodology ? ' · '+(typeof PMHUB.getMethodology==='function'?PMHUB.getMethodology(project.methodology).shortLabel||project.methodology:project.methodology) : ''}</div>
      <h1 class="proj-name">${project.name}</h1>
      <div class="proj-type">${project.client?'Client : '+project.client+' · ':''}${project.start?'Début : '+formatDate(project.start)+'  ·  ':''}Fin prévue : ${formatDate(project.end)}</div>
      <div class="proj-progress-wrap">
        <div class="proj-progress-header">
          <span>Avancement global</span>
          <span style="color:${progressColor};font-weight:700;">${progress}%</span>
        </div>
        <div class="proj-progress-bar">
          <div class="proj-progress-fill" style="width:${progress}%;background:${progressColor}"></div>
        </div>
      </div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="status-badge ${statusClass[project.status]||'active'}">${statusLabel[project.status]||project.status}</span>
      <span class="health-rag-badge rag-${health.rag}">${health.rag==='green'?'● Santé bonne':health.rag==='amber'?'● Attention':'● Critique'} · ${health.score}/100</span>
    </div>
    <div class="proj-header-actions">
      <a class="proj-btn primary" href="${wizardUrl}">🧭 Wizard</a>
      <a class="proj-btn" href="${ganttUrl}">📅 Gantt</a>
      <a class="proj-btn" href="pm-hub-kanban.html?project=${projectId}">🗂 Kanban</a>
      <a class="proj-btn" href="${raidUrl}">⚠️ RAID</a>
      <a class="proj-btn" href="${templatesUrl}">📋 Templates</a>
    </div>
  </div>
</div>

<!-- KPI STRIP (5 KPIs) -->
<div class="kpi-strip">
  <div class="kpi g">
    <div class="kpi-label">Avancement</div>
    <div style="position:relative;width:82px;height:82px;margin:8px 0 4px;">
      ${avancementDonutHtml}
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;">
        <span style="font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:${progressColor};line-height:1;">${progress}%</span>
      </div>
    </div>
    <div class="kpi-sub">Progression globale</div>
  </div>
  <div class="kpi b">
    <div class="kpi-label">Jours restants</div>
    <div class="kpi-val">${daysLeft >= 0 ? daysLeft : '–'}</div>
    <div class="kpi-sub">${daysLeft < 0 ? 'Délai dépassé de '+Math.abs(daysLeft)+'j' : daysLeft === 0 ? "Échéance aujourd'hui" : 'avant la fin prévue'}</div>
  </div>
  <div class="kpi r">
    <div class="kpi-label">Risques critiques</div>
    <div class="kpi-val">${criticalRisks}</div>
    <div class="kpi-sub">${criticalRisks > 0 ? 'À traiter en urgence' : 'Aucun risque critique'}</div>
  </div>
  <div class="kpi y">
    <div class="kpi-label">Budget consommé</div>
    <div class="kpi-val">${budgetPct}%</div>
    <div class="kpi-sub">${budgetConsumedStr}</div>
  </div>
  <div class="kpi g">
    <div class="kpi-label">Score santé</div>
    <div style="position:relative;margin:8px 0 2px;">
      ${santeGaugeHtml}
      <div style="position:absolute;bottom:2px;left:0;right:0;text-align:center;">
        <span style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:${ragColor};line-height:1;">${health.score}</span>
      </div>
    </div>
    <div class="kpi-sub">Indice global /100</div>
  </div>
</div>

<!-- ROW GOUVERNANCE + PÉRIMÈTRE -->
<div class="grid-2" style="margin-bottom:18px;">
  <div class="chart-card">
    <div class="chart-card-header">
      <div class="chart-title">Gouvernance</div>
      <div class="chart-sub">Fiche projet · <a href="${wizardUrl}" style="color:var(--accent);text-decoration:none;">Modifier →</a></div>
    </div>
    ${gouvernanceHtml}
  </div>
  <div class="chart-card">
    <div class="chart-card-header">
      <div class="chart-title">Périmètre & Objectifs</div>
      <div class="chart-sub">${hasScope ? 'Périmètre défini' : 'Non défini — voir description'}</div>
    </div>
    ${perimetreHtml}
  </div>
</div>

<!-- ROW 1: RAID + Budget -->
<div class="grid-2" style="margin-bottom:18px;">
  <div class="chart-card">
    <div class="chart-card-header">
      <div class="chart-title">RAID — Répartition</div>
      <div class="chart-sub">${raidTotal} points · <a href="${raidUrl}" style="color:var(--accent);text-decoration:none;">Voir tout →</a></div>
    </div>
    ${raidChartHtml}
    <div style="padding-top:14px;border-top:1px solid var(--border);">
      <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">Sévérité des risques</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">${riskSevHtml}</div>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-card-header">
      <div class="chart-title">Budget</div>
      <div class="chart-sub">${budgetCardSub}</div>
    </div>
    ${budgetDonutHtml ? `<div style="display:flex;align-items:center;gap:18px;margin-bottom:16px;">
      <div style="flex-shrink:0;position:relative;">
        ${budgetDonutHtml}
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;">
          <span style="font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:${budgetBarColor};line-height:1;">${budgetPct}%</span>
          <span style="font-family:'DM Mono',monospace;font-size:7px;color:var(--text-muted);">consommé</span>
        </div>
      </div>
      <div style="flex:1;font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;">
        <div><span style="color:var(--text-muted);">Consommé</span><br><strong style="font-size:13px;color:${budgetBarColor};">${budgetConsumed.toLocaleString('fr-FR')} ${budgetData.currency||'€'}</strong></div>
        <div style="margin-top:6px;"><span style="color:var(--text-muted);">Planifié</span><br><strong style="font-size:13px;">${budgetPlanned.toLocaleString('fr-FR')} ${budgetData.currency||'€'}</strong></div>
        <div style="margin-top:6px;"><span style="color:var(--text-muted);">Restant</span><br><strong style="font-size:13px;color:var(--success);">${(budgetPlanned-budgetConsumed).toLocaleString('fr-FR')} ${budgetData.currency||'€'}</strong></div>
      </div>
    </div>` : budgetChartHtml}
    <div style="margin-top:20px;">
      <div class="chart-card-header" style="border:none;padding:0;margin-bottom:12px;">
        <div class="chart-title" style="font-size:13px;">Description du projet</div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);line-height:1.7;">${(project.desc||'Aucune description renseignée.').replace(/\n/g,'<br>').slice(0,220)}${(project.desc||'').length>220?'…':''}</div>
    </div>
  </div>
</div>

<!-- ROW JALONS + ACTIONS PRIORITAIRES -->
<div class="grid-2" style="margin-bottom:18px;">
  <div class="chart-card">
    <div class="chart-card-header">
      <div class="chart-title">Jalons clés</div>
      <div class="chart-sub">${milestones.length} jalon${milestones.length!==1?'s':''} · <a href="${ganttUrl}" style="color:var(--accent);text-decoration:none;">Voir Gantt →</a></div>
    </div>
    ${milestonesHtml}
    ${taskBreakdownHtml}
  </div>
  <div class="chart-card">
    <div class="chart-card-header">
      <div class="chart-title">Actions prioritaires</div>
      <div class="chart-sub">${openActions.length} en cours · <a href="${raidUrl}" style="color:var(--accent);text-decoration:none;">Voir RAID →</a></div>
    </div>
    ${openActionsHtml}
  </div>
</div>

<!-- ROW 2: Timeline + Équipe -->
<div class="grid-2">
  <div class="chart-card">
    <div class="chart-card-header">
      <div class="chart-title">Timeline projet</div>
      <div class="chart-sub">Du ${formatDate(project.start||project.end)} au ${formatDate(project.end)}</div>
    </div>
    ${timelineHtml}
    <div style="margin-top:20px;">
      <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">Points RAID récents</div>
      <div class="raid-list">
        ${recentRaidItems.length ? recentRaidItems.map(item=>`
          <div class="raid-row">
            <span class="raid-dot ${item.type}"></span>
            <span class="raid-text" style="font-size:12px;">${item.label.length>55?item.label.slice(0,54)+'…':item.label}</span>
            <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);">${item.badge}</span>
          </div>`).join('') : '<div class="raid-row"><span class="raid-text" style="color:var(--text-muted);">Aucun point RAID.</span></div>'}
      </div>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-card-header">
      <div class="chart-title">Équipe projet</div>
      <div class="chart-sub">${teamMembers.length} membre${teamMembers.length>1?'s':''} assigné${teamMembers.length>1?'s':''}</div>
    </div>
    <div class="team-list">
      ${teamMembers.length ? teamMembers.map(r=>`
        <div class="team-item">
          <div class="team-item-left">
            <div class="team-avatar" style="background:${(r.color||project.color||'var(--accent)')}33;color:${r.color||project.color||'var(--accent)'};border:2px solid ${(r.color||project.color||'var(--accent)')}66;">${r.id}</div>
            <div>
              <div class="team-name">${r.name}</div>
              <div class="team-role">${r.role||'Membre'}</div>
            </div>
          </div>
          <div class="team-item-actions">
            <button type="button" class="btn-remove-res" onclick="removeResourceFromProject('${projectId}','${(r.id||'').replace(/'/g,"\\'")}')">Retirer</button>
          </div>
        </div>`).join('') : '<div class="team-item"><span style="color:var(--text-muted);font-size:12px;">Aucune ressource assignée.</span></div>'}
    </div>
    <div class="add-resource-wrap">
      <button type="button" class="add-resource-btn" onclick="openAddResourceModal('${projectId}')">＋ Ajouter une ressource</button>
    </div>
  </div>
</div>
    `;
  } catch (err) {
    console.error('Erreur chargement dashboard projet:', err);
    var el = document.getElementById('projectContent');
    if (el) el.innerHTML = '<div class="wiz-card" style="text-align:center;padding:48px;"><p style="margin-bottom:16px;color:var(--danger);">Erreur de chargement.</p><a href="index.html" class="proj-btn primary">Retour au dashboard</a></div>';
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initProjectDashboard);
} else {
  initProjectDashboard();
}
</script>
<div id="ai-suggestions-bar"></div>
<script src="pmhub-ai-suggestions.js"></script>
</body>
</html>
