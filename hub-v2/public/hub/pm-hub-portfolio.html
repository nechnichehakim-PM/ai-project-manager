<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Hub — Vue Portefeuille</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes/pmhub-theme.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="pmhub-data.js"></script>
<script src="pmhub-nav-context.js"></script>
<script src="pmhub-sidebar.js"></script>
<script src="pmhub-mini-chat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;height:100%;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(212,175,100,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,100,0.02) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);background:rgba(6,10,13,0.92);backdrop-filter:blur(24px);}
.nav-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.22em;color:var(--accent);text-transform:uppercase;}
.nav-context{display:flex;gap:6px;align-items:center;flex:1;justify-content:center;}
.nav-tab{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;padding:7px 13px;border-radius:5px;transition:all .2s;}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,.04);}
.nav-tab.active{color:var(--accent);background:rgba(99,210,180,.07);}
.nav-links{display:flex;gap:6px;align-items:center;}
.nav-icon{font-size:16px;color:var(--text-muted);text-decoration:none;padding:7px 10px;border-radius:5px;transition:color .2s;}
.nav-icon:hover{color:var(--text);}
.nav-back{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--text-muted);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:5px;transition:all .2s;}
.nav-back:hover{color:var(--text);border-color:var(--text-muted);}
.nav-cta{background:rgba(99,210,180,.1);border:1px solid rgba(99,210,180,.3);color:var(--accent);padding:7px 16px;border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:all .2s;}
.nav-cta:hover{background:rgba(99,210,180,.18);}
.ai-float-btn{position:fixed;bottom:28px;right:28px;z-index:350;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#4cbda0);color:#060a0d;font-size:24px;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 8px 28px rgba(99,210,180,.35);border:1px solid rgba(99,210,180,.4);transition:transform .2s;}
.ai-float-btn:hover{transform:scale(1.08);}
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 65px);margin-top:65px;overflow:hidden;}
.main-col{display:flex;flex-direction:column;height:100%;min-height:0;overflow:hidden;}
.main{flex:1;min-height:0;overflow-y:auto;padding:36px 40px 100px;}

/* ALERTS */
.alert-bar{border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px;font-family:'DM Mono',monospace;font-size:11px;}
.alert-bar.red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);}
.alert-bar.amber{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);}
.alert-items{display:flex;flex-wrap:wrap;gap:8px;}
.alert-chip{padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;text-decoration:none;}
.alert-chip.red{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.2);}
.alert-chip.amber{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2);}

/* PAGE HEADER */
.page-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
.page-h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;line-height:1.15;margin-bottom:6px;}
.page-h1 em{font-style:italic;color:var(--accent);}
.page-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:28px;}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:28px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;flex-direction:column;gap:4px;}
.kpi-card.g{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.04);}
.kpi-card.a{border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.04);}
.kpi-card.r{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04);}
.kpi-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.kpi-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;line-height:1;}
.kpi-val.g{color:#22c55e;} .kpi-val.a{color:#f59e0b;} .kpi-val.r{color:var(--danger);}
.kpi-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);}

/* SECTION */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;margin-top:28px;}
.section-hd h2{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-soft);}
.section-hd a{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);text-decoration:none;}

/* PROJECTS TABLE */
.proj-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:28px;}
.proj-table{width:100%;border-collapse:collapse;}
.proj-table thead th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
.proj-table tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s;cursor:pointer;}
.proj-table tbody tr:last-child{border-bottom:none;}
.proj-table tbody tr:hover{background:rgba(255,255,255,.03);}
.proj-table td{padding:12px 14px;font-size:12px;vertical-align:middle;}
.rag-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;}
.rag-g{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.5);}
.rag-a{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.5);}
.rag-r{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.5);}
.proj-name-cell{display:flex;align-items:center;gap:10px;}
.proj-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.prog-bar{height:4px;background:var(--surface3);border-radius:2px;width:80px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;}
.meth-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid var(--border);color:var(--text-muted);}
.meth-badge.agile{color:var(--accent);border-color:rgba(99,210,180,.3);background:rgba(99,210,180,.06);}
.meth-badge.hybride{color:var(--accent2);border-color:rgba(212,175,100,.3);background:rgba(212,175,100,.06);}
.risk-chip{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;}
.risk-chip.none{color:var(--text-muted);}
.risk-chip.has{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2);}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:28px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card-head{padding:16px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.card-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-soft);margin-bottom:2px;}
.card-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);}
.card-body{padding:16px 20px 20px;}
.chart-box{width:100%;height:220px;}

/* TIMELINE */
.timeline-wrap{padding:16px 20px 20px;}
.tl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tl-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-soft);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-bar-wrap{flex:1;height:16px;background:var(--surface2);border-radius:4px;position:relative;overflow:hidden;}
.tl-bar{position:absolute;top:0;height:100%;border-radius:4px;display:flex;align-items:center;padding:0 6px;}
.tl-bar-label{font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;}
.tl-axis{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:8px;color:var(--text-muted);margin-top:6px;padding-left:140px;}
</style>
</head>
<body>
<nav>
  <a href="pm-hub.html" class="nav-back">← Retour</a>
  <div class="nav-logo"><a href="pm-hub.html" style="color:inherit;text-decoration:none;">PM Hub</a></div>
  <div class="nav-context" id="nav-context"></div>
  <div class="nav-links">
    <a href="pm-hub-settings.html" class="nav-icon" title="Paramètres">⚙</a>
  </div>
</nav>
<a href="pm-hub-ai.html?from=Portefeuille" class="ai-float-btn" title="Centre IA">🤖</a>
<div class="layout">
  <aside class="sidebar" id="pmhub-sidebar"></aside>
  <div class="main-col">
  <main class="main">
    <div id="portfolioRoot"></div>
  </main>
  </div>
</div>
<script>
(function() {
'use strict';

// ── HELPERS ──────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtBudget(v) {
  if (!v && v !== 0) return '—';
  if (v >= 1000000) return (v/1000000).toFixed(1).replace('.0','') + ' M€';
  if (v >= 1000) return Math.round(v/1000) + ' k€';
  return v + ' €';
}
function parseBudget(s) { return Number(String(s||0).replace(/\s/g,'').replace(/[^\d.]/g,'')) || 0; }
function fmtDate(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
}
function ragColor(rag) {
  if (rag === 'green') return '#22c55e';
  if (rag === 'red')   return '#ef4444';
  return '#f59e0b';
}
function ragClass(rag) { return rag === 'green' ? 'g' : rag === 'red' ? 'r' : 'a'; }
function methLabel(m) {
  if (!m) return 'N/A';
  if (m === 'agile')   return 'Agile';
  if (m === 'hybride') return 'Hybride';
  return 'Waterfall';
}

// ── DATA ─────────────────────────────────────────────────────────
var today = new Date(); today.setHours(0,0,0,0);
var allProjects  = PMHUB.getProjects();
var activeProjs  = allProjects.filter(function(p){ return p.status === 'active'; });
var allProjs     = allProjects; // for charts

// Enrich each project with computed data
var enriched = activeProjs.map(function(p) {
  var raids  = PMHUB.getRaids ? PMHUB.getRaids(p.id) : {};
  var health = PMHUB.getProjectHealth ? PMHUB.getProjectHealth(p.id) : { rag: 'amber', score: 50 };
  var budgetTpl = PMHUB.getTemplate ? PMHUB.getTemplate(p.id, 'budget') : null;
  var budgetPlanned  = budgetTpl && budgetTpl.planned  ? parseBudget(budgetTpl.planned)  : parseBudget(p.budget);
  var budgetConsumed = budgetTpl && budgetTpl.consumed ? parseBudget(budgetTpl.consumed) : 0;
  var budgetPct  = budgetPlanned > 0 ? Math.round(budgetConsumed / budgetPlanned * 100) : null;
  var endDate    = p.end ? new Date(p.end) : null;
  var daysLeft   = endDate ? Math.round((endDate - today) / 86400000) : null;
  var openRisks  = (raids.risks||[]).filter(function(r){ return r.status !== 'closed'; }).length;
  var critRisks  = (raids.risks||[]).filter(function(r){ return r.status !== 'closed' && (r.severity === 'critical' || r.severity === 'haute'); }).length;
  var openIssues = (raids.issues||[]).filter(function(i){ return i.status !== 'closed'; }).length;
  return {
    p: p,
    rag: health.rag || 'amber',
    score: health.score || 50,
    budgetPlanned: budgetPlanned,
    budgetConsumed: budgetConsumed,
    budgetPct: budgetPct,
    daysLeft: daysLeft,
    openRisks: openRisks,
    critRisks: critRisks,
    openIssues: openIssues,
    raidTotal: (raids.risks||[]).length + (raids.actions||[]).length + (raids.issues||[]).length
  };
});

// ── ALERTS ───────────────────────────────────────────────────────
var alertsRed   = [];
var alertsAmber = [];
enriched.forEach(function(e) {
  var name = e.p.name || e.p.ref;
  if (e.critRisks > 0)   alertsRed.push(name + ' — ' + e.critRisks + ' risque(s) critique(s)');
  if (e.daysLeft !== null && e.daysLeft < 0) alertsRed.push(name + ' — ' + Math.abs(e.daysLeft) + 'j de retard');
  if (e.budgetPct !== null && e.budgetPct > 90) alertsAmber.push(name + ' — Budget ' + e.budgetPct + '% consommé');
  if (e.openIssues > 0)  alertsAmber.push(name + ' — ' + e.openIssues + ' issue(s) ouverte(s)');
});

// ── KPIs ─────────────────────────────────────────────────────────
var totalBudget    = enriched.reduce(function(s,e){ return s + e.budgetPlanned; }, 0);
var totalConsumed  = enriched.reduce(function(s,e){ return s + e.budgetConsumed; }, 0);
var budgetGlobal   = totalBudget > 0 ? Math.round(totalConsumed / totalBudget * 100) : 0;
var healthyCount   = enriched.filter(function(e){ return e.rag === 'green'; }).length;
var atRiskCount    = enriched.filter(function(e){ return e.rag === 'amber'; }).length;
var criticalCount  = enriched.filter(function(e){ return e.rag === 'red'; }).length;
var totalCritRisks = enriched.reduce(function(s,e){ return s + e.critRisks; }, 0);

// Milestones in 30 days
var milestones30 = 0;
enriched.forEach(function(e) {
  var gantt = PMHUB.getGanttTasks ? PMHUB.getGanttTasks(e.p.id) : [];
  var tasks = Array.isArray(gantt) ? gantt : (gantt && Array.isArray(gantt.tasks) ? gantt.tasks : []);
  tasks.forEach(function(t) {
    if (t.type === 'milestone' || t.milestone) {
      var d = t.end ? new Date(t.end) : null;
      if (d) { var diff = Math.round((d - today)/86400000); if (diff >= 0 && diff <= 30) milestones30++; }
    }
  });
});

// ── RENDER ───────────────────────────────────────────────────────
var html = '';

// ALERTS
if (alertsRed.length) {
  html += '<div class="alert-bar red"><span style="font-size:16px;flex-shrink:0;">🔴</span><div><div style="font-weight:700;color:var(--danger);margin-bottom:6px;">Alertes critiques</div><div class="alert-items">';
  alertsRed.forEach(function(a) {
    html += '<a class="alert-chip red" href="#">' + esc(a) + '</a>';
  });
  html += '</div></div></div>';
}
if (alertsAmber.length) {
  html += '<div class="alert-bar amber"><span style="font-size:16px;flex-shrink:0;">⚠️</span><div><div style="font-weight:700;color:#f59e0b;margin-bottom:6px;">Points d\'attention</div><div class="alert-items">';
  alertsAmber.forEach(function(a) {
    html += '<a class="alert-chip amber" href="#">' + esc(a) + '</a>';
  });
  html += '</div></div></div>';
}

// PAGE HEADER
html += '<div class="page-tag">PMO · Portefeuille</div>';
html += '<h1 class="page-h1">Vue <em>Portefeuille</em></h1>';
html += '<p class="page-sub">' + activeProjs.length + ' projet(s) actif(s) · Budget global ' + fmtBudget(totalBudget) + ' · Consommé ' + budgetGlobal + '%</p>';

// KPI STRIP
html += '<div class="kpi-strip">';
html += '<div class="kpi-card"><div class="kpi-label">Projets actifs</div><div class="kpi-val">' + activeProjs.length + '</div><div class="kpi-sub">/ ' + allProjects.length + ' total</div></div>';
html += '<div class="kpi-card g"><div class="kpi-label">Santé OK</div><div class="kpi-val g">' + healthyCount + '</div><div class="kpi-sub">projets en vert</div></div>';
html += '<div class="kpi-card a"><div class="kpi-label">À surveiller</div><div class="kpi-val a">' + atRiskCount + '</div><div class="kpi-sub">projets ambre</div></div>';
html += '<div class="kpi-card r"><div class="kpi-label">Critiques</div><div class="kpi-val r">' + criticalCount + '</div><div class="kpi-sub">' + totalCritRisks + ' risque(s) crit.</div></div>';
html += '<div class="kpi-card"><div class="kpi-label">Budget consommé</div><div class="kpi-val">' + budgetGlobal + '%</div><div class="kpi-sub">' + fmtBudget(totalConsumed) + ' / ' + fmtBudget(totalBudget) + '</div></div>';
html += '<div class="kpi-card"><div class="kpi-label">Jalons 30j</div><div class="kpi-val">' + milestones30 + '</div><div class="kpi-sub">jalons imminents</div></div>';
html += '</div>';

// PROJECTS TABLE
html += '<div class="section-hd"><h2>Projets actifs</h2></div>';
html += '<div class="proj-table-wrap"><table class="proj-table"><thead><tr>';
html += '<th></th><th>Projet</th><th>Méthodo</th><th>Phase</th><th>Avancement</th><th>Budget</th><th>Échéance</th><th>Risques</th><th></th>';
html += '</tr></thead><tbody>';

enriched.forEach(function(e) {
  var p = e.p;
  var progColor = (p.progress||0) >= 80 ? '#22c55e' : (p.progress||0) >= 40 ? '#f59e0b' : '#94a3b8';
  var daysStr = e.daysLeft === null ? '—'
    : e.daysLeft < 0 ? '<span style="color:var(--danger);">⚠ +' + Math.abs(e.daysLeft) + 'j</span>'
    : e.daysLeft <= 14 ? '<span style="color:#f59e0b;">' + e.daysLeft + 'j</span>'
    : e.daysLeft + 'j';
  var budgetStr = e.budgetPlanned > 0
    ? fmtBudget(e.budgetConsumed) + ' / ' + fmtBudget(e.budgetPlanned) + (e.budgetPct !== null ? ' <span style="font-family:\'DM Mono\',monospace;font-size:9px;color:' + (e.budgetPct > 90 ? 'var(--danger)' : e.budgetPct > 70 ? '#f59e0b' : 'var(--text-muted)') + ';">(' + e.budgetPct + '%)</span>' : '')
    : '—';
  var riskStr = e.openRisks > 0
    ? '<span class="risk-chip has">' + e.openRisks + ' ouvert' + (e.openRisks > 1 ? 's' : '') + (e.critRisks > 0 ? ' · ' + e.critRisks + ' crit.' : '') + '</span>'
    : '<span class="risk-chip none">—</span>';
  var methClass = (p.methodology || '').toLowerCase();
  html += '<tr onclick="window.location.href=\'pm-hub-project.html?project=' + p.id + '\'">';
  html += '<td><span class="rag-dot rag-' + ragClass(e.rag) + '"></span></td>';
  html += '<td><div class="proj-name-cell"><div class="proj-icon" style="background:' + (p.color||'var(--accent)') + '18;">' + (p.icon||'📁') + '</div><div><div style="font-weight:600;font-size:12px;">' + esc(p.name||p.ref) + '</div><div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--text-muted);">' + esc(p.ref||'') + '</div></div></div></td>';
  html += '<td><span class="meth-badge ' + methClass + '">' + methLabel(p.methodology) + '</span></td>';
  html += '<td style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--text-soft);">' + esc(p.phase || p.currentPhase || '—') + '</td>';
  html += '<td><div style="display:flex;align-items:center;gap:8px;"><div class="prog-bar"><div class="prog-fill" style="width:' + (p.progress||0) + '%;background:' + progColor + ';"></div></div><span style="font-family:\'DM Mono\',monospace;font-size:10px;color:' + progColor + ';">' + (p.progress||0) + '%</span></div></td>';
  html += '<td style="font-family:\'DM Mono\',monospace;font-size:10px;">' + budgetStr + '</td>';
  html += '<td style="font-family:\'DM Mono\',monospace;font-size:10px;">' + daysStr + '</td>';
  html += '<td>' + riskStr + '</td>';
  html += '<td><a href="pm-hub-project.html?project=' + p.id + '" style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--accent);text-decoration:none;" onclick="event.stopPropagation()">Voir →</a></td>';
  html += '</tr>';
});
if (!enriched.length) {
  html += '<tr><td colspan="9" style="padding:40px;text-align:center;font-family:\'DM Mono\',monospace;font-size:11px;color:var(--text-muted);">Aucun projet actif. <a href="pm-hub-wizard.html" style="color:var(--accent);">Créer un projet →</a></td></tr>';
}
html += '</tbody></table></div>';

// GRID: TIMELINE | CHARTS
html += '<div class="grid-2">';

// TIMELINE
html += '<div class="card"><div class="card-head"><div><div class="card-title">Timeline Portefeuille</div><div class="card-sub">Frise des projets actifs</div></div></div>';
html += '<div class="timeline-wrap">';
if (enriched.length) {
  var allDates = [];
  enriched.forEach(function(e) {
    if (e.p.start) allDates.push(new Date(e.p.start).getTime());
    if (e.p.end)   allDates.push(new Date(e.p.end).getTime());
  });
  var minTs = Math.min.apply(null, allDates);
  var maxTs = Math.max.apply(null, allDates);
  var span  = maxTs - minTs || 1;
  enriched.forEach(function(e) {
    var s = e.p.start ? new Date(e.p.start).getTime() : minTs;
    var end = e.p.end   ? new Date(e.p.end).getTime()   : maxTs;
    var left  = Math.round((s - minTs) / span * 100);
    var width = Math.max(4, Math.round((end - s) / span * 100));
    var color = ragColor(e.rag);
    var todayPct = Math.round((today.getTime() - minTs) / span * 100);
    html += '<div class="tl-row">';
    html += '<div class="tl-label" title="' + esc(e.p.name) + '">' + esc((e.p.name||e.p.ref).slice(0,18)) + '</div>';
    html += '<div class="tl-bar-wrap">';
    if (todayPct >= 0 && todayPct <= 100) {
      html += '<div style="position:absolute;left:' + todayPct + '%;top:0;bottom:0;width:1px;background:rgba(212,175,100,.6);z-index:1;"></div>';
    }
    html += '<div class="tl-bar" style="left:' + left + '%;width:' + width + '%;background:' + color + '22;border:1px solid ' + color + '55;">';
    html += '<span class="tl-bar-label" style="color:' + color + ';">' + (e.p.progress||0) + '%</span>';
    html += '</div></div></div>';
  });
  var fmtY = function(ts) { return new Date(ts).toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}); };
  html += '<div class="tl-axis"><span>' + fmtY(minTs) + '</span><span>Aujourd\'hui</span><span>' + fmtY(maxTs) + '</span></div>';
} else {
  html += '<div style="padding:20px;text-align:center;font-family:\'DM Mono\',monospace;font-size:11px;color:var(--text-muted);">Aucun projet actif</div>';
}
html += '</div></div>';

// CHARTS COL
html += '<div style="display:flex;flex-direction:column;gap:18px;">';
// Donut santé
html += '<div class="card"><div class="card-head"><div><div class="card-title">Santé des projets</div><div class="card-sub">Répartition RAG</div></div></div><div class="card-body"><div id="chartHealth" class="chart-box" style="height:180px;"></div></div></div>';
// Donut méthodo
html += '<div class="card"><div class="card-head"><div><div class="card-title">Méthodologies</div><div class="card-sub">Répartition Waterfall / Agile / Hybride</div></div></div><div class="card-body"><div id="chartMethodo" class="chart-box" style="height:160px;"></div></div></div>';
html += '</div>';

html += '</div>'; // end grid-2

// GRID: Budget bars | Risk matrix
html += '<div class="grid-2">';
html += '<div class="card"><div class="card-head"><div><div class="card-title">Budget par projet</div><div class="card-sub">Planifié vs consommé</div></div></div><div class="card-body"><div id="chartBudget" class="chart-box"></div></div></div>';
html += '<div class="card"><div class="card-head"><div><div class="card-title">Matrice Risques × Budget</div><div class="card-sub">Risques ouverts vs budget planifié · taille = risques critiques</div></div></div><div class="card-body"><div id="chartMatrix" class="chart-box"></div></div></div>';
html += '</div>';

document.getElementById('portfolioRoot').innerHTML = html;

// ── ECHARTS ──────────────────────────────────────────────────────
if (typeof echarts === 'undefined') return;

var dark = { textStyle: { color: '#94a3b8' }, splitLine: { lineStyle: { color: 'rgba(255,255,255,.05)' } } };

// Chart 1 — Santé RAG
var healthEl = document.getElementById('chartHealth');
if (healthEl && (healthyCount + atRiskCount + criticalCount) > 0) {
  healthEl.style.height = '180px';
  var cH = echarts.init(healthEl);
  cH.setOption({
    backgroundColor: 'transparent',
    color: ['#22c55e','#f59e0b','#ef4444'],
    legend: { orient: 'vertical', right: '5%', top: 'center', textStyle: { color: '#94a3b8', fontSize: 10 } },
    series: [{ type: 'pie', radius: ['48%','70%'], center: ['38%','50%'], avoidLabelOverlap: true,
      label: { show: false },
      data: [
        { value: healthyCount,  name: 'Vert — ' + healthyCount },
        { value: atRiskCount,   name: 'Ambre — ' + atRiskCount },
        { value: criticalCount, name: 'Rouge — ' + criticalCount }
      ]
    }]
  });
}

// Chart 2 — Méthodologies
var methEl = document.getElementById('chartMethodo');
if (methEl) {
  methEl.style.height = '160px';
  var wf  = activeProjs.filter(function(p){ return !p.methodology || p.methodology === 'waterfall'; }).length;
  var ag  = activeProjs.filter(function(p){ return p.methodology === 'agile'; }).length;
  var hy  = activeProjs.filter(function(p){ return p.methodology === 'hybride'; }).length;
  var cM = echarts.init(methEl);
  cM.setOption({
    backgroundColor: 'transparent',
    color: ['#63d2b4','#d4af64','#818cf8'],
    legend: { orient: 'vertical', right: '5%', top: 'center', textStyle: { color: '#94a3b8', fontSize: 10 } },
    series: [{ type: 'pie', radius: ['45%','65%'], center: ['38%','50%'],
      label: { show: false },
      data: [
        { value: wf, name: 'Waterfall — ' + wf },
        { value: ag, name: 'Agile — ' + ag },
        { value: hy, name: 'Hybride — ' + hy }
      ].filter(function(d){ return d.value > 0; })
    }]
  });
}

// Chart 3 — Budget bars (planifié vs consommé)
var budgetEl = document.getElementById('chartBudget');
if (budgetEl && enriched.length) {
  budgetEl.style.height = '220px';
  var names    = enriched.map(function(e){ return (e.p.name||e.p.ref).slice(0,14); });
  var planned  = enriched.map(function(e){ return Math.round(e.budgetPlanned/1000); });
  var consumed = enriched.map(function(e){ return Math.round(e.budgetConsumed/1000); });
  var cB = echarts.init(budgetEl);
  cB.setOption({
    backgroundColor: 'transparent',
    grid: { left: 50, right: 16, top: 20, bottom: 60 },
    legend: { bottom: 0, textStyle: { color: '#94a3b8', fontSize: 10 } },
    xAxis: { type: 'category', data: names, axisLabel: { color: '#94a3b8', rotate: 20, fontSize: 9 }, axisLine: { lineStyle: { color: 'rgba(255,255,255,.08)' } } },
    yAxis: { type: 'value', name: 'k€', nameTextStyle: { color: '#94a3b8', fontSize: 9 }, axisLabel: { color: '#94a3b8', fontSize: 9 }, splitLine: { lineStyle: { color: 'rgba(255,255,255,.05)' } } },
    series: [
      { name: 'Planifié', type: 'bar', data: planned,  itemStyle: { color: 'rgba(99,210,180,.25)', borderRadius: [3,3,0,0] }, barGap: '10%' },
      { name: 'Consommé', type: 'bar', data: consumed, itemStyle: { color: '#63d2b4', borderRadius: [3,3,0,0] } }
    ]
  });
}

// Chart 4 — Risk matrix scatter
var matrixEl = document.getElementById('chartMatrix');
if (matrixEl && enriched.length) {
  matrixEl.style.height = '220px';
  var scatterData = enriched.map(function(e) {
    return {
      value: [e.openRisks, Math.round(e.budgetPlanned/1000), Math.max(8, e.critRisks * 6 + 8)],
      name: e.p.name || e.p.ref,
      itemStyle: { color: ragColor(e.rag) }
    };
  });
  var cS = echarts.init(matrixEl);
  cS.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      formatter: function(params) {
        return params.data.name + '<br>Risques ouverts : ' + params.data.value[0] + '<br>Budget : ' + params.data.value[1] + ' k€';
      }
    },
    grid: { left: 50, right: 16, top: 20, bottom: 36 },
    xAxis: { type: 'value', name: 'Risques ouverts', nameLocation: 'middle', nameGap: 24, nameTextStyle: { color: '#94a3b8', fontSize: 9 }, axisLabel: { color: '#94a3b8', fontSize: 9 }, splitLine: { lineStyle: { color: 'rgba(255,255,255,.05)' } } },
    yAxis: { type: 'value', name: 'Budget (k€)', nameTextStyle: { color: '#94a3b8', fontSize: 9 }, axisLabel: { color: '#94a3b8', fontSize: 9 }, splitLine: { lineStyle: { color: 'rgba(255,255,255,.05)' } } },
    series: [{
      type: 'scatter',
      symbolSize: function(d){ return d[2]; },
      data: scatterData,
      label: { show: true, formatter: function(p){ return (p.data.name||'').slice(0,10); }, position: 'top', fontSize: 8, color: '#94a3b8' }
    }]
  });
}

})();
</script>
<div id="ai-suggestions-bar"></div>
<script src="pmhub-ai-suggestions.js"></script>
</body>
</html>
