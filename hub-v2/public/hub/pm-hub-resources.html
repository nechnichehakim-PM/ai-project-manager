<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Hub — Ressources</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes/pmhub-theme.css">
<script src="pmhub-data.js"></script>
<script src="pmhub-nav-context.js"></script>
<script src="pmhub-sidebar.js"></script>
<script src="pmhub-mini-chat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;opacity:.35;}
nav{position:relative;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.nav-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--accent);text-transform:uppercase;}

/* ── LAYOUT ─────────────────────────────────────────── */
.layout{display:grid;grid-template-columns:260px 1fr;grid-template-rows:1fr;height:calc(100vh - 65px);overflow:hidden;position:relative;z-index:1;}
.main-col{display:flex;flex-direction:column;overflow:hidden;height:100%;min-height:0;}

/* ── TOP BAR ─────────────────────────────────────────── */
.res-bar{display:flex;align-items:center;gap:10px;padding:9px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap;}
.res-bar-title{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);}
.add-btn{display:flex;align-items:center;gap:6px;background:var(--accent);color:#060a0d;padding:7px 14px;border-radius:5px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:none;cursor:pointer;transition:opacity .2s;margin-left:auto;}
.add-btn:hover{opacity:.85;}

/* ── KPI STRIP ───────────────────────────────────────── */
.res-kpis{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.rkpi{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 6px;border-right:1px solid var(--border);cursor:default;transition:background .15s;min-width:0;}
.rkpi:last-child{border-right:none;}
.rkpi:hover{background:var(--surface2);}
.rkpi-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;line-height:1;white-space:nowrap;}
.rkpi-lbl{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-top:2px;text-align:center;}

/* ── SCROLL ──────────────────────────────────────────── */
.res-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;padding-bottom:90px;min-height:0;}
.res-scroll::-webkit-scrollbar{width:5px;}
.res-scroll::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}

/* ── FILTER BAR ──────────────────────────────────────── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.fb-search{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:10px;outline:none;width:160px;transition:border-color .2s;}
.fb-search:focus{border-color:var(--accent);}
.fb-sel{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:10px;outline:none;cursor:pointer;}
.fb-sel:focus{border-color:var(--accent);}
.fb-toggle{font-family:'DM Mono',monospace;font-size:10px;padding:6px 11px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.fb-toggle:hover{color:var(--danger);border-color:rgba(239,68,68,.35);}
.fb-toggle.active{background:rgba(239,68,68,.1);color:var(--danger);border-color:rgba(239,68,68,.35);}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-left:auto;}
.vt-btn{font-family:'DM Mono',monospace;font-size:10px;padding:6px 10px;background:transparent;color:var(--text-muted);border:none;cursor:pointer;transition:all .15s;}
.vt-btn.active{background:var(--surface2);color:var(--text);}

/* ── TABS ────────────────────────────────────────────── */
.tabs-row{display:flex;gap:3px;margin-bottom:18px;border-bottom:1px solid var(--border);}
.rtab{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-muted);transition:all .2s;margin-bottom:-1px;white-space:nowrap;}
.rtab:hover{color:var(--text);}
.rtab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── RESOURCE CARDS ──────────────────────────────────── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.res-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s;}
.res-card:hover{border-color:rgba(99,210,180,.25);}
.res-card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
.res-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0;}
.res-name{font-size:13px;font-weight:700;line-height:1.2;}
.res-role{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.08em;margin-top:2px;}
.res-badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.res-level{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;border:1px solid;}
.level-senior{border-color:rgba(99,210,180,.3);color:var(--accent);}
.level-confirmed{border-color:rgba(122,184,232,.3);color:var(--accent3);}
.level-junior{border-color:rgba(245,158,11,.3);color:var(--accent2);}
.res-tjm{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.2);}
.res-card-actions{display:flex;gap:4px;margin-left:auto;}
.icon-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text-muted);cursor:pointer;font-size:10px;transition:all .15s;flex-shrink:0;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.icon-btn.del:hover{border-color:var(--danger);color:var(--danger);}

/* Double availability bar */
.dbar-wrap{margin-bottom:14px;}
.dbar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.dbar-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-muted);width:70px;flex-shrink:0;}
.dbar-track{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.dbar-fill{height:100%;border-radius:3px;transition:width .5s;}
.dbar-pct{font-family:'DM Mono',monospace;font-size:8px;width:32px;text-align:right;flex-shrink:0;}
.charge-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;margin-top:4px;}
.charge-ok{background:rgba(34,197,94,.1);color:var(--success);border:1px solid rgba(34,197,94,.2);}
.charge-warn{background:rgba(245,158,11,.1);color:var(--accent2);border:1px solid rgba(245,158,11,.2);}
.charge-over{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.22);}

/* Skills */
.res-skills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.skill-tag{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all .15s;}
.skill-tag:hover,.skill-tag.active{border-color:var(--accent);color:var(--accent);background:rgba(99,210,180,.06);}

/* Projects chips */
.res-projs{border-top:1px solid var(--border);padding-top:10px;}
.res-projs-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.proj-chip{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:9px;background:rgba(99,210,180,.06);border:1px solid rgba(99,210,180,.15);border-radius:3px;padding:3px 8px;margin:2px;color:var(--accent);}

/* ── LIST VIEW ───────────────────────────────────────── */
.res-table-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);}
.res-table{width:100%;border-collapse:collapse;}
.res-table th{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-muted);padding:9px 14px;border-bottom:1px solid var(--border);background:var(--surface2);text-align:left;white-space:nowrap;}
.res-table td{padding:11px 14px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;vertical-align:middle;}
.res-table tr:last-child td{border-bottom:none;}
.res-table tr:hover td{background:var(--surface2);}

/* ── WORKLOAD TAB ────────────────────────────────────── */
.workload-wrap{display:flex;flex-direction:column;gap:10px;}
.wl-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.wl-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.wl-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;flex-shrink:0;}
.wl-name{font-size:12px;font-weight:700;flex:1;}
.wl-role{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);}
.wl-pct{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0;}
.wl-bar-wrap{position:relative;}
.wl-bar-track{height:14px;background:var(--surface2);border-radius:4px;overflow:hidden;display:flex;}
.wl-segment{height:100%;transition:width .5s;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.wl-seg-lbl{font-family:'DM Mono',monospace;font-size:7px;color:rgba(0,0,0,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 3px;}
.wl-capacity-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(239,68,68,.7);}
.wl-bar-labels{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;}
.wl-bar-lbl{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:8px;color:var(--text-muted);}
.wl-bar-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.wl-over-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.22);}
.wl-free-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;background:rgba(34,197,94,.08);color:var(--success);border:1px solid rgba(34,197,94,.15);}
.wl-legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;}
.wl-leg-item{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);}
.wl-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* ── SKILLS MATRIX ───────────────────────────────────── */
.skills-matrix-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--surface);}
.skills-matrix{border-collapse:collapse;min-width:500px;}
.skills-matrix th{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:8px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);background:var(--surface2);text-align:center;white-space:nowrap;}
.skills-matrix th.res-col{text-align:left;min-width:160px;}
.skills-matrix td{padding:9px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;font-family:'DM Mono',monospace;font-size:11px;}
.skills-matrix td:last-child,.skills-matrix th:last-child{border-right:none;}
.skills-matrix tr:last-child td{border-bottom:none;}
.skills-matrix tr:hover td{background:var(--surface2);}
.sm-check{color:var(--accent);font-size:13px;}
.sm-empty{color:var(--surface3);}
.sm-res-cell{display:flex;align-items:center;gap:8px;text-align:left;}
.sm-count{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(99,210,180,.1);color:var(--accent);border:1px solid rgba(99,210,180,.2);}
.skill-count-row td{background:var(--surface2);font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);border-top:1px solid var(--border);}

/* ── MODAL ───────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(3,6,9,.93);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;padding:20px;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform .3s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-strip{height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:14px 14px 0 0;}
.modal-head{padding:24px 28px 0;display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;}
.modal-close{width:30px;height:30px;border-radius:5px;background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.modal-close:hover{border-color:var(--danger);color:var(--danger);}
.modal-body{padding:20px 28px 28px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);}
.form-input,.form-select{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:border-color .2s;outline:none;width:100%;}
.form-input:focus,.form-select:focus{border-color:var(--accent);}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.btn-primary{background:var(--accent);color:#060a0d;padding:10px 20px;border-radius:5px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;cursor:pointer;transition:opacity .2s;}
.btn-primary:hover{opacity:.88;}
.btn-secondary{background:transparent;color:var(--text-muted);padding:10px 16px;border-radius:5px;font-family:'Syne',sans-serif;font-size:11px;border:1px solid var(--border);cursor:pointer;transition:all .2s;}
.btn-secondary:hover{border-color:var(--accent);color:var(--text);}
.btn-danger{background:var(--danger);color:#fff;padding:10px 18px;border-radius:5px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;border:none;cursor:pointer;transition:opacity .2s;}
.btn-danger:hover{opacity:.85;}

/* ── CONFIRM MODAL ───────────────────────────────────── */
.confirm-overlay{position:fixed;inset:0;z-index:500;background:rgba(3,6,9,.95);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.confirm-overlay.open{opacity:1;pointer-events:all;}
.confirm-box{background:var(--surface);border:1px solid rgba(239,68,68,.3);border-radius:14px;padding:36px;width:400px;max-width:95vw;text-align:center;transform:translateY(16px);transition:transform .25s;}
.confirm-overlay.open .confirm-box{transform:translateY(0);}

/* ── TOAST ───────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;z-index:600;background:var(--surface2);border:1px solid rgba(99,210,180,.3);border-radius:10px;padding:11px 18px;font-family:'DM Mono',monospace;font-size:11px;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.ai-float-btn{position:fixed;bottom:28px;right:28px;z-index:350;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#4cbda0);color:#060a0d;font-size:22px;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 6px 24px rgba(99,210,180,.3);transition:transform .2s;}
.ai-float-btn:hover{transform:scale(1.08);}
.empty-state{text-align:center;padding:50px 20px;font-family:'DM Mono',monospace;color:var(--text-muted);font-size:11px;line-height:1.8;}
/* ── MES TÂCHES ──────────────────────────────────────── */
.tasks-section{margin-bottom:24px;}
.tasks-section-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px 8px 0 0;border-bottom:none;}
.tasks-section-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;flex-shrink:0;}
.tasks-section-name{font-size:12px;font-weight:700;}
.tasks-section-role{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);}
.tasks-count{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(99,210,180,.1);color:var(--accent);border:1px solid rgba(99,210,180,.2);margin-left:auto;}
.tasks-table-wrap{border:1px solid var(--border);border-radius:0 0 8px 8px;overflow:hidden;background:var(--surface);}
.tasks-table{width:100%;border-collapse:collapse;}
.tasks-table th{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-muted);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2);text-align:left;white-space:nowrap;}
.tasks-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;vertical-align:middle;}
.tasks-table tr:last-child td{border-bottom:none;}
.tasks-table tr:hover td{background:var(--surface2);}
.task-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--text);}
.task-proj{font-family:'DM Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(99,210,180,.06);border:1px solid rgba(99,210,180,.15);color:var(--accent);white-space:nowrap;}
.ks-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;white-space:nowrap;}
.ks-todo{background:rgba(107,120,133,.1);color:var(--text-muted);border:1px solid var(--border);}
.ks-progress{background:rgba(122,184,232,.1);color:var(--accent3);border:1px solid rgba(122,184,232,.2);}
.ks-review{background:rgba(245,158,11,.1);color:var(--accent2);border:1px solid rgba(245,158,11,.2);}
.ks-done{background:rgba(34,197,94,.1);color:var(--success);border:1px solid rgba(34,197,94,.2);}
.ks-overdue{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2);}
.pri-high{color:var(--danger);}
.pri-medium{color:var(--accent2);}
.pri-low{color:var(--success);}
.task-progress{height:4px;background:var(--surface2);border-radius:2px;width:60px;display:inline-block;overflow:hidden;vertical-align:middle;}
.task-progress-fill{height:100%;border-radius:2px;}
</style>
</head>
<body>

<nav>
  <a href="pm-hub.html" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);text-decoration:none;">← Retour</a>
  <div class="nav-logo"><a href="pm-hub.html" style="color:inherit;text-decoration:none;">PM Hub</a></div>
  <div class="nav-context" id="nav-context"></div>
  <div style="display:flex;gap:8px;">
    <a href="pm-hub-settings.html" style="font-size:11px;color:var(--text-muted);text-decoration:none;padding:6px 10px;border-radius:5px;" title="Paramètres">⚙</a>
  </div>
</nav>

<a href="pm-hub-ai.html?from=Ressources" class="ai-float-btn" id="aiFloatBtn" title="Assistant IA">🤖</a>
<div class="toast" id="toast"></div>

<div class="layout">
  <aside class="sidebar" id="pmhub-sidebar"></aside>
  <div class="main-col">

    <!-- TOP BAR -->
    <div class="res-bar">
      <span class="res-bar-title">👥 Ressources &amp; Équipe</span>
      <button class="add-btn" onclick="openAddRes()">＋ Ajouter un membre</button>
    </div>

    <!-- KPI STRIP -->
    <div class="res-kpis">
      <div class="rkpi"><span class="rkpi-val" id="k_total" style="color:var(--accent)">—</span><span class="rkpi-lbl">Membres</span></div>
      <div class="rkpi"><span class="rkpi-val" id="k_dispo">—</span><span class="rkpi-lbl">Dispo. moy.</span></div>
      <div class="rkpi"><span class="rkpi-val" id="k_charge">—</span><span class="rkpi-lbl">Charge moy.</span></div>
      <div class="rkpi"><span class="rkpi-val" id="k_over" style="color:var(--danger)">—</span><span class="rkpi-lbl">Surchargés</span></div>
      <div class="rkpi"><span class="rkpi-val" id="k_tjm" style="color:#a78bfa">—</span><span class="rkpi-lbl">TJM moyen</span></div>
    </div>

    <!-- SCROLL -->
    <div class="res-scroll" id="resScroll">

      <!-- FILTER BAR -->
      <div class="filter-bar">
        <input class="fb-search" id="fbSearch" type="text" placeholder="🔍 Rechercher…" oninput="renderCurrent()">
        <select class="fb-sel" id="fbLevel" onchange="renderCurrent()">
          <option value="">Tous niveaux</option>
          <option value="Senior">Senior</option>
          <option value="Confirmé">Confirmé</option>
          <option value="Junior">Junior</option>
        </select>
        <select class="fb-sel" id="fbSkill" onchange="renderCurrent()">
          <option value="">Toutes compétences</option>
        </select>
        <button class="fb-toggle" id="fbOver" onclick="toggleOverloaded()">⚡ Surchargés</button>
        <div class="view-toggle" id="viewToggle">
          <button class="vt-btn active" id="vt-cards" onclick="setView('cards')">⊞ Cartes</button>
          <button class="vt-btn" id="vt-list"  onclick="setView('list')">≡ Liste</button>
        </div>
      </div>

      <!-- TABS -->
      <div class="tabs-row">
        <div class="rtab active" id="tab-team"     onclick="setTab('team')">Équipe</div>
        <div class="rtab"        id="tab-workload" onclick="setTab('workload')">Charge de travail</div>
        <div class="rtab"        id="tab-skills"   onclick="setTab('skills')">Matrice compétences</div>
      <div class="rtab"        id="tab-tasks"    onclick="setTab('tasks')">Mes tâches</div>
      </div>

      <!-- TAB CONTENT -->
      <div id="tabContent"></div>

    </div>
  </div>
</div>

<!-- MODAL RESSOURCE -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-strip"></div>
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">Nouveau membre</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Identifiant (2-3 lettres) *</label>
          <input class="form-input" id="f_id" placeholder="Ex: AN" maxlength="3">
        </div>
        <div class="form-group">
          <label class="form-label">Niveau</label>
          <select class="form-select" id="f_level">
            <option>Senior</option><option>Confirmé</option><option>Junior</option>
          </select>
        </div>
        <div class="form-group full">
          <label class="form-label">Nom complet *</label>
          <input class="form-input" id="f_name" placeholder="Prénom Nom">
        </div>
        <div class="form-group full">
          <label class="form-label">Rôle / Poste</label>
          <input class="form-input" id="f_role" placeholder="Ex: Chef de projet, Data Engineer…">
        </div>
        <div class="form-group">
          <label class="form-label">Disponibilité (%)</label>
          <input class="form-input" id="f_avail" type="number" min="0" max="100" value="80">
        </div>
        <div class="form-group">
          <label class="form-label">TJM (€/jour)</label>
          <input class="form-input" id="f_tjm" type="number" min="0" placeholder="Ex: 650">
        </div>
        <div class="form-group full">
          <label class="form-label">Compétences (séparées par virgule)</label>
          <input class="form-input" id="f_skills" placeholder="Python, SQL, Jira, Power BI…">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn-primary" onclick="saveRes()">Enregistrer →</button>
      </div>

  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-box">
    <div style="font-size:32px;margin-bottom:12px;">🗑️</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;margin-bottom:8px;">Supprimer ce membre ?</div>
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);line-height:1.7;margin-bottom:24px;">
      <span id="confirmName" style="color:var(--text)"></span><br>sera retiré de l'équipe. Action irréversible.
    </div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn-secondary" onclick="closeConfirm()">Annuler</button>
      <button class="btn-danger" onclick="executeDelete()">Supprimer</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
var _editingId  = null;
var _deleteId   = null;
var _currentTab = 'team';
var _currentView = 'cards';
var _showOverloaded = false;

var PROJ_COLORS = ['#63d2b4','#F59E0B','#7C3AED','#EF4444','#7ab8e8','#e8c97a','#b07ae8','#e07070','#22C55E','#EC4899'];

// ══════════════════════════════════════════════════════
// DATA HELPERS
// ══════════════════════════════════════════════════════
function getResources() {
  return typeof PMHUB !== 'undefined' ? PMHUB.getResources() : [];
}
function saveResources(list) {
  if (typeof PMHUB !== 'undefined') PMHUB.saveResources(list);
}
function getProjects() {
  return typeof PMHUB !== 'undefined' ? PMHUB.getProjects().filter(function(p) { return p.status !== 'archived'; }) : [];
}
function getActiveProjects() {
  return getProjects().filter(function(p) { return p.status === 'active'; });
}

function calcAlloc(res) {
  var projs = getActiveProjects().filter(function(p) { return p.team && p.team.indexOf(res.id) >= 0; });
  return projs.length * 25;
}
function isOverloaded(res) {
  return calcAlloc(res) > (res.availability || 80);
}
function chargeClass(alloc, avail) {
  if (alloc === 0) return { cls:'charge-ok', lbl:'Disponible' };
  if (alloc > avail) return { cls:'charge-over', lbl:'Surchargé ' + alloc + '%' };
  if (alloc > avail * 0.85) return { cls:'charge-warn', lbl:'Chargé ' + alloc + '%' };
  return { cls:'charge-ok', lbl:'Charge ' + alloc + '%' };
}
function levelClass(level) {
  if (level === 'Senior') return 'level-senior';
  if (level === 'Confirmé') return 'level-confirmed';
  return 'level-junior';
}
function availColor(pct) {
  if (pct >= 70) return 'var(--success)';
  if (pct >= 40) return 'var(--accent2)';
  return 'var(--danger)';
}
function allocColor(alloc, avail) {
  if (alloc > avail) return 'var(--danger)';
  if (alloc > avail * 0.85) return 'var(--accent2)';
  return 'var(--accent)';
}

// ══════════════════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════════════════
function filterResources() {
  var q      = (document.getElementById('fbSearch')?.value || '').toLowerCase();
  var level  = document.getElementById('fbLevel')?.value || '';
  var skill  = document.getElementById('fbSkill')?.value || '';
  return getResources().filter(function(r) {
    if (q && !(r.name||'').toLowerCase().includes(q) && !(r.role||'').toLowerCase().includes(q)) return false;
    if (level && r.level !== level) return false;
    if (skill && !(r.skills||[]).includes(skill)) return false;
    if (_showOverloaded && !isOverloaded(r)) return false;
    return true;
  });
}

function populateSkillFilter() {
  var all = getResources();
  var skills = [];
  all.forEach(function(r) { (r.skills||[]).forEach(function(s) { if (s && skills.indexOf(s) < 0) skills.push(s); }); });
  skills.sort();
  var sel = document.getElementById('fbSkill');
  var cur = sel.value;
  sel.innerHTML = '<option value="">Toutes compétences</option>' + skills.map(function(s) { return '<option' + (s===cur?' selected':'') + '>' + s + '</option>'; }).join('');
}

// ══════════════════════════════════════════════════════
// KPIs
// ══════════════════════════════════════════════════════
function updateKPIs() {
  var res = getResources();
  if (!res.length) {
    ['k_total','k_dispo','k_charge','k_over','k_tjm'].forEach(function(id) { var el = document.getElementById(id); if(el) el.textContent = '—'; });
    return;
  }
  var avgDispo   = Math.round(res.reduce(function(s,r) { return s + (r.availability||80); }, 0) / res.length);
  var allocs     = res.map(function(r) { return calcAlloc(r); });
  var avgCharge  = Math.round(allocs.reduce(function(s,v) { return s+v; }, 0) / res.length);
  var overCount  = res.filter(function(r) { return isOverloaded(r); }).length;
  var tjms       = res.filter(function(r) { return r.tjm > 0; }).map(function(r) { return r.tjm; });
  var avgTjm     = tjms.length ? Math.round(tjms.reduce(function(s,v) { return s+v; }, 0) / tjms.length) : null;

  document.getElementById('k_total').textContent  = res.length;
  document.getElementById('k_dispo').textContent  = avgDispo + '%';
  document.getElementById('k_dispo').style.color  = availColor(avgDispo);
  document.getElementById('k_charge').textContent = avgCharge + '%';
  document.getElementById('k_charge').style.color = avgCharge > 80 ? 'var(--danger)' : avgCharge > 60 ? 'var(--accent2)' : 'var(--success)';
  document.getElementById('k_over').textContent   = overCount;
  document.getElementById('k_over').style.color   = overCount > 0 ? 'var(--danger)' : 'var(--success)';
  document.getElementById('k_tjm').textContent    = avgTjm ? avgTjm + ' €' : '—';
}

// ══════════════════════════════════════════════════════
// TAB — ÉQUIPE (cards)
// ══════════════════════════════════════════════════════
function renderCards() {
  var res  = filterResources();
  var projs = getActiveProjects();
  if (!res.length) {
    return '<div class="empty-state">👥<br>Aucun membre trouvé.<br>Ajustez les filtres ou ajoutez un membre.</div>';
  }
  return '<div class="cards-grid">' + res.map(function(r) {
    var alloc  = calcAlloc(r);
    var avail  = r.availability || 80;
    var cc     = chargeClass(alloc, avail);
    var myProjs = projs.filter(function(p) { return p.team && p.team.indexOf(r.id) >= 0; });
    var skillsHtml = (r.skills||[]).map(function(s) { return '<span class="skill-tag">' + s.replace(/</g,'&lt;') + '</span>'; }).join('');
    var projsHtml = myProjs.length
      ? '<div class="res-projs"><div class="res-projs-lbl">Projets assignés</div>' +
        myProjs.map(function(p) { return '<span class="proj-chip">' + (p.icon||'📁') + ' ' + (p.name||'').slice(0,20) + '</span>'; }).join('') +
        '</div>'
      : '';
    var tjmBadge = r.tjm ? '<span class="res-tjm">' + r.tjm + ' €/j</span>' : '';
    var nameEsc = (r.name||'').replace(/'/g,"\\'");
    var idEsc   = (r.id||'').replace(/'/g,"\\'");
    return '<div class="res-card">' +
      '<div class="res-card-top">' +
        '<div class="res-avatar" style="background:' + (r.color||'#63d2b4') + '22;color:' + (r.color||'#63d2b4') + ';border:2px solid ' + (r.color||'#63d2b4') + '33;">' + (r.id||'?') + '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="res-name">' + (r.name||'').replace(/</g,'&lt;') + '</div>' +
          '<div class="res-role">' + (r.role||'').replace(/</g,'&lt;') + '</div>' +
          '<div class="res-badges"><span class="res-level ' + levelClass(r.level) + '">' + (r.level||'') + '</span>' + tjmBadge + '</div>' +
        '</div>' +
        '<div class="res-card-actions">' +
          '<button class="icon-btn" onclick="openEditRes(\'' + idEsc + '\')" title="Modifier">✏️</button>' +
          '<button class="icon-btn del" onclick="confirmDelete(\'' + idEsc + '\',\'' + nameEsc + '\')" title="Supprimer">🗑️</button>' +
        '</div>' +
      '</div>' +
      '<div class="dbar-wrap">' +
        '<div class="dbar-row">' +
          '<span class="dbar-lbl">Disponibilité</span>' +
          '<div class="dbar-track"><div class="dbar-fill" style="width:' + avail + '%;background:' + availColor(avail) + ';"></div></div>' +
          '<span class="dbar-pct" style="color:' + availColor(avail) + '">' + avail + '%</span>' +
        '</div>' +
        '<div class="dbar-row">' +
          '<span class="dbar-lbl">Charge actuelle</span>' +
          '<div class="dbar-track"><div class="dbar-fill" style="width:' + Math.min(alloc,100) + '%;background:' + allocColor(alloc,avail) + ';"></div></div>' +
          '<span class="dbar-pct" style="color:' + allocColor(alloc,avail) + '">' + alloc + '%</span>' +
        '</div>' +
        '<span class="charge-badge ' + cc.cls + '">' + cc.lbl + '</span>' +
      '</div>' +
      (skillsHtml ? '<div class="res-skills">' + skillsHtml + '</div>' : '') +
      projsHtml +
      '</div>';
  }).join('') + '</div>';
}

// ══════════════════════════════════════════════════════
// TAB — ÉQUIPE (list/table)
// ══════════════════════════════════════════════════════
function renderList() {
  var res = filterResources();
  if (!res.length) return '<div class="empty-state">Aucun membre trouvé.</div>';
  var rows = res.map(function(r) {
    var alloc = calcAlloc(r);
    var avail = r.availability || 80;
    var cc    = chargeClass(alloc, avail);
    var myProjs = getActiveProjects().filter(function(p) { return p.team && p.team.indexOf(r.id) >= 0; });
    var idEsc   = (r.id||'').replace(/'/g,"\\'");
    var nameEsc = (r.name||'').replace(/'/g,"\\'");
    return '<tr>' +
      '<td><div style="display:flex;align-items:center;gap:8px;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:' + (r.color||'#63d2b4') + '22;color:' + (r.color||'#63d2b4') + ';border:1.5px solid ' + (r.color||'#63d2b4') + '44;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;">' + (r.id||'') + '</div>' +
        '<div><div style="font-family:\'Syne\',sans-serif;font-size:11px;font-weight:600;">' + (r.name||'').replace(/</g,'&lt;') + '</div>' +
        '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--text-muted);">' + (r.role||'').replace(/</g,'&lt;') + '</div></div>' +
      '</div></td>' +
      '<td><span class="res-level ' + levelClass(r.level) + '">' + (r.level||'—') + '</span></td>' +
      '<td style="color:' + availColor(avail) + '">' + avail + '%</td>' +
      '<td><span class="charge-badge ' + cc.cls + '">' + alloc + '%</span></td>' +
      '<td style="color:#a78bfa">' + (r.tjm ? r.tjm + ' €/j' : '—') + '</td>' +
      '<td>' + myProjs.slice(0,3).map(function(p){ return '<span class="proj-chip" style="font-size:8px;">' + (p.name||'').slice(0,16) + '</span>'; }).join('') + (myProjs.length > 3 ? ' <span style="font-size:9px;color:var(--text-muted);">+' + (myProjs.length-3) + '</span>' : '') + '</td>' +
      '<td><div style="display:flex;gap:4px;">' +
        '<button class="icon-btn" onclick="openEditRes(\'' + idEsc + '\')" title="Modifier">✏️</button>' +
        '<button class="icon-btn del" onclick="confirmDelete(\'' + idEsc + '\',\'' + nameEsc + '\')" title="Supprimer">🗑️</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
  return '<div class="res-table-wrap"><table class="res-table"><thead><tr>' +
    '<th>Membre</th><th>Niveau</th><th>Dispo.</th><th>Charge</th><th>TJM</th><th>Projets actifs</th><th></th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

// ══════════════════════════════════════════════════════
// TAB — WORKLOAD
// ══════════════════════════════════════════════════════
function renderWorkload() {
  var res    = getResources();
  var projs  = getActiveProjects();
  if (!res.length) return '<div class="empty-state">Aucun membre. Ajoutez des membres pour voir leur charge.</div>';

  // Build legend
  var legendHtml = '<div class="wl-legend">' +
    projs.map(function(p, i) {
      return '<div class="wl-leg-item"><div class="wl-leg-dot" style="background:' + PROJ_COLORS[i % PROJ_COLORS.length] + ';"></div>' + (p.name||'').slice(0,20) + '</div>';
    }).join('') +
    '<div class="wl-leg-item"><div style="width:2px;height:14px;background:rgba(239,68,68,.7);flex-shrink:0;"></div>Seuil de disponibilité</div>' +
  '</div>';

  var rowsHtml = res.map(function(r) {
    var avail  = r.availability || 80;
    var myProjs = projs.filter(function(p) { return p.team && p.team.indexOf(r.id) >= 0; });
    var totalAlloc = myProjs.length * 25;
    var over   = totalAlloc > avail;

    // Stacked segments: each project gets 25% width
    var segHtml = myProjs.map(function(p, i) {
      var globalIdx = projs.indexOf(p);
      var color = PROJ_COLORS[globalIdx % PROJ_COLORS.length];
      var w = 25; // 25% per project
      return '<div class="wl-segment" style="width:' + w + '%;background:' + color + ';opacity:.85;" title="' + (p.name||'') + ' — 25%">' +
        '<span class="wl-seg-lbl">' + (p.name||'').slice(0,8) + '</span>' +
      '</div>';
    }).join('');

    // Remaining capacity (if not overloaded)
    if (totalAlloc < 100) {
      segHtml += '<div class="wl-segment" style="width:' + (100 - totalAlloc) + '%;background:var(--surface2);"></div>';
    }

    // Availability marker position
    var capLeft = Math.min(avail, 100);

    var badge = over
      ? '<span class="wl-over-badge">⚡ Surchargé +' + (totalAlloc - avail) + '%</span>'
      : (totalAlloc === 0 ? '<span class="wl-free-badge">✓ Disponible</span>' : '<span class="wl-free-badge">✓ ' + (avail - totalAlloc) + '% libre</span>');

    var projLabels = myProjs.length
      ? '<div class="wl-bar-labels">' +
        myProjs.map(function(p, i) {
          var globalIdx = projs.indexOf(p);
          var color = PROJ_COLORS[globalIdx % PROJ_COLORS.length];
          return '<div class="wl-bar-lbl"><div class="wl-bar-dot" style="background:' + color + ';"></div>' + (p.name||'').slice(0,18) + ' 25%</div>';
        }).join('') +
        '</div>'
      : '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--text-muted);margin-top:4px;">Aucun projet actif assigné</div>';

    return '<div class="wl-row">' +
      '<div class="wl-header">' +
        '<div class="wl-avatar" style="background:' + (r.color||'#63d2b4') + '22;color:' + (r.color||'#63d2b4') + ';border:2px solid ' + (r.color||'#63d2b4') + '33;">' + (r.id||'?') + '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="wl-name">' + (r.name||'').replace(/</g,'&lt;') + '</div>' +
          '<div class="wl-role">' + (r.role||'').replace(/</g,'&lt;') + '</div>' +
        '</div>' +
        badge +
        '<div class="wl-pct" style="color:' + (over ? 'var(--danger)' : 'var(--success)') + '">' + totalAlloc + '%</div>' +
      '</div>' +
      '<div class="wl-bar-wrap">' +
        '<div class="wl-bar-track">' + segHtml + '</div>' +
        '<div class="wl-capacity-line" style="left:' + capLeft + '%;"></div>' +
      '</div>' +
      projLabels +
    '</div>';
  }).join('');

  return legendHtml + '<div class="workload-wrap">' + rowsHtml + '</div>';
}

// ══════════════════════════════════════════════════════
// TAB — SKILLS MATRIX
// ══════════════════════════════════════════════════════
function renderSkillsMatrix() {
  var res = getResources();
  if (!res.length) return '<div class="empty-state">Aucun membre. Ajoutez des membres avec des compétences.</div>';

  // Collect all unique skills
  var allSkills = [];
  res.forEach(function(r) {
    (r.skills||[]).forEach(function(s) {
      if (s && allSkills.indexOf(s) < 0) allSkills.push(s);
    });
  });
  allSkills.sort();

  if (!allSkills.length) return '<div class="empty-state">Aucune compétence renseignée.<br>Éditez les membres pour ajouter leurs compétences.</div>';

  var thead = '<thead><tr><th class="res-col">Membre</th>' +
    allSkills.map(function(s) { return '<th>' + s.replace(/</g,'&lt;') + '</th>'; }).join('') +
    '<th>Score</th></tr></thead>';

  var tbody = res.map(function(r) {
    var skills  = r.skills || [];
    var count   = 0;
    var cells   = allSkills.map(function(s) {
      var has = skills.indexOf(s) >= 0;
      if (has) count++;
      return '<td>' + (has ? '<span class="sm-check">✓</span>' : '<span class="sm-empty">·</span>') + '</td>';
    }).join('');
    return '<tr>' +
      '<td><div class="sm-res-cell">' +
        '<div style="width:24px;height:24px;border-radius:50%;background:' + (r.color||'#63d2b4') + '22;color:' + (r.color||'#63d2b4') + ';border:1.5px solid ' + (r.color||'#63d2b4') + '44;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;">' + (r.id||'') + '</div>' +
        '<div><div style="font-family:\'Syne\',sans-serif;font-size:11px;font-weight:600;">' + (r.name||'').replace(/</g,'&lt;') + '</div>' +
        '<div style="font-family:\'DM Mono\',monospace;font-size:8px;color:var(--text-muted);">' + (r.role||'') + '</div></div>' +
      '</div></td>' +
      cells +
      '<td><span class="sm-count">' + count + '/' + allSkills.length + '</span></td>' +
    '</tr>';
  }).join('');

  // Skill count row (how many people have each skill)
  var countRow = '<tr class="skill-count-row"><td style="font-weight:700;font-family:\'DM Mono\',monospace;font-size:9px;">Couverture</td>' +
    allSkills.map(function(s) {
      var n = res.filter(function(r) { return (r.skills||[]).indexOf(s) >= 0; }).length;
      var color = n >= 2 ? 'var(--success)' : n === 1 ? 'var(--accent2)' : 'var(--danger)';
      return '<td style="color:' + color + ';font-weight:700;">' + n + '</td>';
    }).join('') +
    '<td></td></tr>';

  return '<div class="skills-matrix-wrap"><table class="skills-matrix">' + thead + '<tbody>' + tbody + countRow + '</tbody></table></div>';
}

// ══════════════════════════════════════════════════════
// TAB — MES TÂCHES
// ══════════════════════════════════════════════════════
function getAllTasks() {
  var projs = getProjects();
  var result = [];
  projs.forEach(function(p) {
    try {
      var raw = localStorage.getItem('pmhub_tasks_' + p.id);
      if (!raw) return;
      var tasks = JSON.parse(raw);
      tasks.forEach(function(t) {
        if (t.type === 'group') return;
        result.push({ task: t, project: p });
      });
    } catch(e) {}
  });
  return result;
}

function taskStatusBadge(t) {
  var today = new Date();
  var isOD  = t.end && new Date(t.end) < today && (t.progress||0) < 100;
  if (isOD) return '<span class="ks-badge ks-overdue">⚠ En retard</span>';
  var ks = t.kanbanStatus || (t.progress >= 100 ? 'done' : t.progress > 0 ? 'in_progress' : 'todo');
  var map = { todo:'<span class="ks-badge ks-todo">À faire</span>', in_progress:'<span class="ks-badge ks-progress">En cours</span>', review:'<span class="ks-badge ks-review">En revue</span>', done:'<span class="ks-badge ks-done">Terminé</span>' };
  return map[ks] || '<span class="ks-badge ks-todo">' + ks + '</span>';
}

function fmtDateShort(d) {
  if (!d) return '—';
  var ms = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  var parts = d.split('-');
  return parseInt(parts[2]) + ' ' + ms[parseInt(parts[1])-1] + ' ' + parts[0].slice(2);
}

function renderTasks() {
  var res     = getResources();
  var allTasks = getAllTasks();
  if (!res.length) return '<div class="empty-state">Aucun membre. Ajoutez des membres pour voir leurs tâches.</div>';

  var totalAssigned = 0;
  var html = '';
  res.forEach(function(r) {
    var mine = allTasks.filter(function(x) {
      return (x.task.owner||'').toLowerCase() === (r.name||r.id).toLowerCase() ||
             (x.task.assignee||'').toLowerCase() === (r.name||r.id).toLowerCase() ||
             (x.task.assignee||'').toLowerCase() === (r.id||'').toLowerCase();
    });
    totalAssigned += mine.length;

    // Sort: overdue first, then in_progress, then todo, then done
    mine.sort(function(a, b) {
      var today = new Date();
      var aOD = a.task.end && new Date(a.task.end) < today && (a.task.progress||0) < 100;
      var bOD = b.task.end && new Date(b.task.end) < today && (b.task.progress||0) < 100;
      if (aOD && !bOD) return -1;
      if (!aOD && bOD) return 1;
      var order = { in_progress:0, review:1, todo:2, done:3 };
      var as = a.task.kanbanStatus || 'todo';
      var bs = b.task.kanbanStatus || 'todo';
      return (order[as]||2) - (order[bs]||2);
    });

    var rows = mine.length
      ? mine.map(function(x) {
          var t   = x.task;
          var p   = x.project;
          var pct = t.progress || 0;
          var pc  = pct >= 80 ? '#22C55E' : pct >= 40 ? '#F59E0B' : '#94a3b8';
          var pri = t.priority || 'medium';
          var priMap = { high:'● Haute', medium:'● Moy.', low:'● Faible' };
          var priCls = { high:'pri-high', medium:'pri-medium', low:'pri-low' };
          return '<tr>' +
            '<td><div class="task-name">' + (t.name||'').replace(/</g,'&lt;') + '</div></td>' +
            '<td><span class="task-proj">' + (p.icon||'📁') + ' ' + (p.name||'').slice(0,20) + '</span></td>' +
            '<td>' + taskStatusBadge(t) + '</td>' +
            '<td><span class="' + (priCls[pri]||'pri-medium') + '" style="font-family:\'DM Mono\',monospace;font-size:9px;">' + (priMap[pri]||pri) + '</span></td>' +
            '<td><div class="task-progress"><div class="task-progress-fill" style="width:' + pct + '%;background:' + pc + ';"></div></div> <span style="font-size:9px;color:var(--text-muted);">' + pct + '%</span></td>' +
            '<td style="color:var(--text-muted);font-size:9px;">' + fmtDateShort(t.end) + '</td>' +
          '</tr>';
        }).join('')
      : '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);font-family:\'DM Mono\',monospace;font-size:10px;padding:16px;">Aucune tâche assignée</td></tr>';

    html += '<div class="tasks-section">' +
      '<div class="tasks-section-hdr">' +
        '<div class="tasks-section-avatar" style="background:' + (r.color||'#63d2b4') + '22;color:' + (r.color||'#63d2b4') + ';border:2px solid ' + (r.color||'#63d2b4') + '33;">' + (r.id||'?') + '</div>' +
        '<div><div class="tasks-section-name">' + (r.name||'').replace(/</g,'&lt;') + '</div><div class="tasks-section-role">' + (r.role||'') + '</div></div>' +
        '<span class="tasks-count">' + mine.length + ' tâche' + (mine.length !== 1 ? 's' : '') + '</span>' +
      '</div>' +
      '<div class="tasks-table-wrap"><table class="tasks-table">' +
        '<thead><tr><th>Tâche</th><th>Projet</th><th>Statut</th><th>Priorité</th><th>Progression</th><th>Échéance</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>' +
    '</div>';
  });

  if (totalAssigned === 0) {
    return '<div class="empty-state">📋<br>Aucune tâche assignée à un membre.<br>Ouvrez une carte Kanban et assignez un responsable depuis la liste des ressources.</div>';
  }
  return html;
}

// ══════════════════════════════════════════════════════
// RENDER DISPATCH
// ══════════════════════════════════════════════════════
function renderCurrent() {
  updateKPIs();
  var tc = document.getElementById('tabContent');
  if (!tc) return;
  if (_currentTab === 'team') {
    document.getElementById('filter-bar-wrap') && (document.getElementById('filter-bar-wrap').style.display = '');
    tc.innerHTML = _currentView === 'cards' ? renderCards() : renderList();
  } else if (_currentTab === 'workload') {
    tc.innerHTML = renderWorkload();
  } else if (_currentTab === 'skills') {
    tc.innerHTML = renderSkillsMatrix();
  } else if (_currentTab === 'tasks') {
    tc.innerHTML = renderTasks();
  }
}

function setTab(tab) {
  _currentTab = tab;
  document.querySelectorAll('.rtab').forEach(function(t) { t.classList.remove('active'); });
  var el = document.getElementById('tab-' + tab);
  if (el) el.classList.add('active');
  // Filter bar only relevant on team tab
  var fb = document.querySelector('.filter-bar');
  if (fb) fb.style.display = (tab === 'team') ? '' : 'none';
  // View toggle only on team tab
  var vt = document.getElementById('viewToggle');
  if (vt) vt.style.display = (tab === 'team') ? '' : 'none';
  renderCurrent();
}

function setView(view) {
  _currentView = view;
  document.querySelectorAll('.vt-btn').forEach(function(b) { b.classList.remove('active'); });
  var el = document.getElementById('vt-' + view);
  if (el) el.classList.add('active');
  renderCurrent();
}

function toggleOverloaded() {
  _showOverloaded = !_showOverloaded;
  var btn = document.getElementById('fbOver');
  if (btn) btn.classList.toggle('active', _showOverloaded);
  renderCurrent();
}

// ══════════════════════════════════════════════════════
// CRUD
// ══════════════════════════════════════════════════════
function openAddRes() {
  _editingId = null;
  document.getElementById('modalTitle').textContent = 'Nouveau membre';
  document.getElementById('f_id').disabled = false;
  ['f_id','f_name','f_role','f_skills'].forEach(function(id) { var el = document.getElementById(id); if(el) el.value = ''; });
  document.getElementById('f_level').value = 'Senior';
  document.getElementById('f_avail').value = '80';
  document.getElementById('f_tjm').value   = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function() { document.getElementById('f_name').focus(); }, 100);
}

function openEditRes(id) {
  var res = getResources().find(function(r) { return r.id === id; });
  if (!res) return;
  _editingId = id;
  document.getElementById('modalTitle').textContent = 'Modifier le membre';
  document.getElementById('f_id').value       = res.id;
  document.getElementById('f_id').disabled    = true;
  document.getElementById('f_name').value     = res.name || '';
  document.getElementById('f_role').value     = res.role || '';
  document.getElementById('f_level').value    = res.level || 'Senior';
  document.getElementById('f_avail').value    = res.availability || 80;
  document.getElementById('f_tjm').value      = res.tjm || '';
  document.getElementById('f_skills').value   = (res.skills||[]).join(', ');
  document.getElementById('modalOverlay').classList.add('open');
}

function saveRes() {
  var name = document.getElementById('f_name').value.trim();
  if (!name) { document.getElementById('f_name').style.borderColor = 'var(--danger)'; return; }
  var resources = getResources().slice();
  var id = _editingId || (document.getElementById('f_id').value.trim().toUpperCase() || name.split(' ').map(function(w) { return w[0]||''; }).join('').slice(0,2).toUpperCase() || 'XX');
  var colors = ['#63d2b4','#e8c97a','#7ab8e8','#e07070','#b07ae8','#F59E0B','#22C55E','#EC4899'];
  var newRes = {
    id:           id,
    name:         name,
    role:         document.getElementById('f_role').value.trim(),
    level:        document.getElementById('f_level').value,
    availability: parseInt(document.getElementById('f_avail').value) || 80,
    tjm:          parseInt(document.getElementById('f_tjm').value)   || 0,
    skills:       document.getElementById('f_skills').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean),
    color:        _editingId
      ? (resources.find(function(r) { return r.id===_editingId; })||{}).color || colors[resources.length % colors.length]
      : colors[resources.length % colors.length]
  };
  if (_editingId) {
    var idx = resources.findIndex(function(r) { return r.id === _editingId; });
    if (idx !== -1) resources[idx] = newRes;
  } else {
    resources.push(newRes);
  }
  saveResources(resources);
  closeModal();
  populateSkillFilter();
  renderCurrent();
  showToast(_editingId ? '✓ Membre mis à jour' : '✓ Membre ajouté');
}

function confirmDelete(id, name) {
  _deleteId = id;
  var el = document.getElementById('confirmName');
  if (el) el.textContent = name;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  _deleteId = null;
  document.getElementById('confirmOverlay').classList.remove('open');
}
function executeDelete() {
  if (!_deleteId) return;
  var resources = getResources().filter(function(r) { return r.id !== _deleteId; });
  saveResources(resources);
  closeConfirm();
  populateSkillFilter();
  renderCurrent();
  showToast('🗑 Membre supprimé');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(function() { t.classList.remove('show'); }, 2400);
}

// ── BOOT ──
(function debugRes() {
  var raw = localStorage.getItem('pmhub_resources');
  var parsed = raw ? JSON.parse(raw) : null;
  var msg = raw
    ? 'localStorage pmhub_resources : ' + (parsed ? parsed.length : '?') + ' entrées → [' + (parsed||[]).map(function(r){return r.id;}).join(', ') + ']'
    : 'localStorage pmhub_resources : ABSENT (DEFAULT_RESOURCES utilisé)';
  var dbg = document.createElement('div');
  dbg.id = 'res-debug-banner';

  dbg.textContent = msg;
  dbg.title = 'Clic pour masquer';
  dbg.onclick = function(){ dbg.remove(); };
  document.body.appendChild(dbg);
  setTimeout(function(){ if(dbg.parentNode) dbg.remove(); }, 10000);
})();
populateSkillFilter();
renderCurrent();
</script>
