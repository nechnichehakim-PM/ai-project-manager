<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DelHub — Dashboard</title>
<link rel="stylesheet" href="themes/hub-theme.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="hub-data.js"></script>
<script src="hub-nav-context.js"></script>
<script src="hub-sidebar.js"></script>
<script src="hub-mini-chat.js"></script>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-dot"></div>
    <a href="delhub-dashboard.html" style="color:inherit;text-decoration:none;">DelHub / v1.0</a>
  </div>
  <div class="nav-context" id="nav-context"></div>
  <div class="nav-links">
    <a href="delhub-settings.html" class="nav-icon nav-link-with-label" title="Paramètres"><span class="nav-icon-symbol">⚙</span></a>
  </div>
</nav>

<a href="#" class="ai-float-btn" id="aiFloatBtn" title="Assistant IA">🤖</a>

<div class="layout">
  <aside class="sidebar" id="delhub-sidebar"></aside>
  <div class="main-col">
  <main class="main" style="padding:32px;overflow-y:auto">

    <!-- HERO -->
    <div class="hero-bar" id="heroBar">
      <div class="hero-left">
        <span class="hero-badge" id="heroBadge">Delivery & Business Hub</span>
        <h1 class="hero-title" id="heroTitle">Dashboard</h1>
        <p class="hero-sub" id="heroSub">Pilotez votre activité commerciale, vos livraisons et vos engagements clients.</p>
      </div>
    </div>

    <!-- KPI STRIP -->
    <div class="kpi-strip" id="kpiStrip" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin:24px 0"></div>

    <!-- CHARTS ROW -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px" id="chartsRow">
      <div class="card" style="padding:20px">
        <h3 style="font-family:var(--font-heading);font-size:14px;margin-bottom:16px;color:var(--text)">Activité</h3>
        <div id="chartMain" style="width:100%;height:280px"></div>
      </div>
      <div class="card" style="padding:20px">
        <h3 style="font-family:var(--font-heading);font-size:14px;margin-bottom:16px;color:var(--text)">Répartition</h3>
        <div id="chartSecondary" style="width:100%;height:280px"></div>
      </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div style="margin-top:24px" id="quickActions"></div>

  </main>
  </div>
</div>

<script>
(function() {
  if (typeof DELHUB === 'undefined') return;

  var role = DELHUB.getEffectiveRole();
  var kpis = DELHUB.getDashboardKPIs(role);

  // Adapt hero by role
  var heroTexts = {
    god:      { badge: 'GOD MODE', title: 'Dashboard Unifié', sub: 'Vue complète : Commercial + Business + Delivery' },
    head:     { badge: 'C-Level', title: 'Dashboard Exécutif', sub: 'Vue consolidée de toute l\'activité' },
    sales:    { badge: 'Commercial', title: 'Dashboard Sales', sub: 'Pipeline, opportunités et prévisions' },
    business: { badge: 'Business', title: 'Dashboard Business', sub: 'Contrats, marges et portefeuille' },
    delivery: { badge: 'Delivery', title: 'Dashboard Delivery', sub: 'SLA, pipeline et incidents' },
  };
  var ht = heroTexts[role] || heroTexts.delivery;
  document.getElementById('heroBadge').textContent = ht.badge;
  document.getElementById('heroTitle').textContent = ht.title;
  document.getElementById('heroSub').textContent = ht.sub;

  // KPI cards
  var kpiHTML = '';

  function kpiCard(label, value, sub, color) {
    return '<div class="kpi-card" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px">' +
      '<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:8px">' + label + '</div>' +
      '<div style="font-size:28px;font-weight:700;font-family:var(--font-heading);color:' + (color || 'var(--text)') + '">' + value + '</div>' +
      (sub ? '<div style="font-size:11px;color:var(--text-soft);margin-top:4px">' + sub + '</div>' : '') +
    '</div>';
  }

  // Sales KPIs
  if (kpis.crm) {
    kpiHTML += kpiCard('Pipeline', kpis.crm.pipelineValue.toLocaleString('fr-FR') + ' €', kpis.crm.activeOpportunities + ' opportunités actives', 'var(--primary)');
    kpiHTML += kpiCard('Win Rate', kpis.crm.winRate + '%', kpis.crm.totalOpportunities + ' total', kpis.crm.winRate >= 50 ? 'var(--success)' : 'var(--warning)');
  }

  // Business KPIs
  if (kpis.business) {
    kpiHTML += kpiCard('Contrats actifs', kpis.business.activeContracts, kpis.business.totalContracts + ' total', 'var(--primary)');
    kpiHTML += kpiCard('Marge', kpis.business.totalMargin.toLocaleString('fr-FR') + ' €', 'CA: ' + kpis.business.totalRevenue.toLocaleString('fr-FR') + ' €', kpis.business.totalMargin >= 0 ? 'var(--success)' : 'var(--danger)');
  }

  // Delivery KPIs
  if (kpis.delivery) {
    kpiHTML += kpiCard('SLA Compliance', kpis.delivery.slaCompliance + '%', kpis.delivery.slaAtRisk + ' at risk, ' + kpis.delivery.slaBreached + ' breached', kpis.delivery.slaCompliance >= 90 ? 'var(--success)' : 'var(--danger)');
    kpiHTML += kpiCard('Incidents ouverts', kpis.delivery.openIncidents, kpis.delivery.p1Incidents + ' P1', kpis.delivery.p1Incidents > 0 ? 'var(--danger)' : 'var(--text)');
    kpiHTML += kpiCard('Releases', kpis.delivery.upcomingReleases, 'à venir', 'var(--primary)');
    kpiHTML += kpiCard('Livrables', kpis.delivery.delivered + ' / ' + kpis.delivery.pipelineItems, 'livrés', 'var(--success)');
  }

  document.getElementById('kpiStrip').innerHTML = kpiHTML;

  // Charts
  if (typeof echarts !== 'undefined') {
    // Main chart — depends on role
    var mainChart = echarts.init(document.getElementById('chartMain'));
    var secondChart = echarts.init(document.getElementById('chartSecondary'));

    if (kpis.crm) {
      // CRM Pipeline bar chart
      var stages = DELHUB.CRM_STAGES.filter(function(s) { return s.id !== 'won' && s.id !== 'lost'; });
      mainChart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'category', data: stages.map(function(s) { return s.label; }), axisLabel: { color: '#9CA3AF', fontSize: 10 } },
        yAxis: { type: 'value', axisLabel: { color: '#9CA3AF' }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } } },
        series: [{
          type: 'bar',
          data: stages.map(function(s) { return { value: kpis.crm.byStage[s.id] ? kpis.crm.byStage[s.id].amount : 0, itemStyle: { color: s.color } }; }),
          barWidth: '50%',
          itemStyle: { borderRadius: [6, 6, 0, 0] }
        }],
        backgroundColor: 'transparent',
        grid: { left: 50, right: 20, top: 10, bottom: 30 }
      });

      // Won/Lost pie
      var wonCount = kpis.crm.byStage.won ? kpis.crm.byStage.won.count : 0;
      var lostCount = kpis.crm.byStage.lost ? kpis.crm.byStage.lost.count : 0;
      secondChart.setOption({
        tooltip: { trigger: 'item' },
        series: [{
          type: 'pie', radius: ['45%', '70%'],
          data: [
            { value: wonCount, name: 'Gagné', itemStyle: { color: '#22C55E' } },
            { value: lostCount, name: 'Perdu', itemStyle: { color: '#EF4444' } },
            { value: kpis.crm.activeOpportunities, name: 'En cours', itemStyle: { color: '#2DD4BF' } }
          ],
          label: { color: '#9CA3AF', fontSize: 11 }
        }],
        backgroundColor: 'transparent'
      });
    } else if (kpis.delivery) {
      // SLA donut
      mainChart.setOption({
        tooltip: { trigger: 'item' },
        series: [{
          type: 'pie', radius: ['45%', '70%'],
          data: [
            { value: kpis.delivery.slaMet, name: 'Met', itemStyle: { color: '#22C55E' } },
            { value: kpis.delivery.slaAtRisk, name: 'At Risk', itemStyle: { color: '#F59E0B' } },
            { value: kpis.delivery.slaBreached, name: 'Breached', itemStyle: { color: '#EF4444' } }
          ],
          label: { color: '#9CA3AF', fontSize: 11 }
        }],
        backgroundColor: 'transparent'
      });

      // Pipeline phases bar
      var pipeline = DELHUB.getPipeline();
      var phases = ['backlog', 'in_progress', 'review', 'delivered'];
      var phaseLabels = ['Backlog', 'En cours', 'Review', 'Livré'];
      var phaseColors = ['#9CA3AF', '#2DD4BF', '#F59E0B', '#22C55E'];
      secondChart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'category', data: phaseLabels, axisLabel: { color: '#9CA3AF', fontSize: 10 } },
        yAxis: { type: 'value', axisLabel: { color: '#9CA3AF' }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } } },
        series: [{
          type: 'bar',
          data: phases.map(function(ph, i) {
            return { value: pipeline.filter(function(p) { return p.phase === ph; }).length, itemStyle: { color: phaseColors[i] } };
          }),
          barWidth: '50%',
          itemStyle: { borderRadius: [6, 6, 0, 0] }
        }],
        backgroundColor: 'transparent',
        grid: { left: 40, right: 20, top: 10, bottom: 30 }
      });
    }

    // Responsive
    window.addEventListener('resize', function() { mainChart.resize(); secondChart.resize(); });
  }

  // Quick actions
  var actionsHTML = '<div style="display:flex;gap:12px;flex-wrap:wrap">';
  var actions = [];

  if (DELHUB.canAccess('crm')) actions.push({ label: 'Nouveau prospect', href: 'delhub-crm.html', icon: '🎯' });
  if (DELHUB.canAccess('contracts')) actions.push({ label: 'Nouveau contrat', href: 'delhub-contracts.html', icon: '📋' });
  if (DELHUB.canAccess('pipeline')) actions.push({ label: 'Nouveau livrable', href: 'delhub-pipeline.html', icon: '🚀' });
  if (DELHUB.canAccess('incidents')) actions.push({ label: 'Déclarer incident', href: 'delhub-incidents.html', icon: '🚨' });

  actions.forEach(function(a) {
    actionsHTML += '<a href="' + a.href + '" style="display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);text-decoration:none;font-size:12px;font-weight:600;transition:var(--transition)" onmouseover="this.style.borderColor=\'var(--primary)\'" onmouseout="this.style.borderColor=\'var(--border)\'">' +
      '<span>' + a.icon + '</span>' + a.label + '</a>';
  });

  actionsHTML += '</div>';
  document.getElementById('quickActions').innerHTML = actionsHTML;

})();
</script>
<script>
window.HUB_AI_PAGE = {
  pageId: 'delhub-dashboard',
  title: 'IA Dashboard Delivery',
  icon: '\uD83D\uDE80',
  suggestions: [
    'Synthese delivery du jour',
    'Alertes et incidents en cours',
    'Prevision de livraison',
    'KPIs a surveiller'
  ],
  buildContext: function() {
    if (typeof DELHUB === 'undefined') return '';
    var contracts = DELHUB.getContracts ? DELHUB.getContracts() : [];
    var incidents = DELHUB.getIncidents ? DELHUB.getIncidents() : [];
    var sla = DELHUB.getEngagements ? DELHUB.getEngagements() : [];
    var opps = DELHUB.getOpportunities ? DELHUB.getOpportunities() : [];
    var activeContracts = contracts.filter(function(c){return c.status==='active';}).length;
    var openIncidents = incidents.filter(function(i){return i.status!=='resolved'&&i.status!=='closed';}).length;
    var critIncidents = incidents.filter(function(i){return (i.severity==='P1'||i.severity==='critical')&&i.status!=='resolved'&&i.status!=='closed';}).length;
    var lines = ['=== DASHBOARD DELIVERY ==='];
    lines.push('Contrats actifs: '+activeContracts+', Incidents ouverts: '+openIncidents+' (critiques: '+critIncidents+')');
    lines.push('SLA: '+sla.length+' engagements, Pipeline: '+opps.length+' opportunites');
    return lines.join('\n');
  },
  predictions: function() {
    return 'Synthese delivery: 1) Situation globale avec score de sante 2) Incidents critiques a traiter 3) SLA a risque de breach 4) Prevision de CA a 1 mois 5) Focus recommande de la semaine';
  }
};
</script>
<script src="hub-ai-widget.js"></script>
</body>
</html>
