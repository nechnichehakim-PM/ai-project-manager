<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DelHub — Capacity Planning</title>
<link rel="stylesheet" href="themes/hub-theme.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="hub-data.js"></script>
<script src="hub-nav-context.js"></script>
<script src="hub-sidebar.js"></script>
<script src="hub-mini-chat.js"></script>
<style>
.kpi-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
.kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; transition:var(--transition); }
.kpi-card:hover { border-color:var(--border-active); transform:translateY(-2px); }
.kpi-label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-family:var(--font-mono); margin-bottom:8px; }
.kpi-value { font-size:28px; font-weight:700; font-family:var(--font-heading); }
.kpi-sub { font-size:11px; color:var(--text-soft); margin-top:4px; }

.btn { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:var(--transition); font-family:var(--font-body); }
.btn-primary { background:var(--primary); color:#0B0F19; }
.btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
.btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--primary); color:var(--primary); }
.btn-danger { background:rgba(239,68,68,0.12); color:var(--danger); border:1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background:rgba(239,68,68,0.22); }
.btn-sm { padding:5px 12px; font-size:12px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.data-table { width:100%; border-collapse:collapse; }
.data-table th { text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); padding:12px 16px; border-bottom:1px solid var(--border); font-family:var(--font-mono); }
.data-table td { padding:13px 16px; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); vertical-align:middle; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tbody tr { transition:var(--transition); }
.data-table tbody tr:hover { background:var(--surface2); }
.data-table tbody tr.row-overloaded { border-left:3px solid var(--danger); }

.util-bar-wrap { background:var(--surface3); border-radius:99px; height:8px; width:140px; overflow:hidden; }
.util-bar-fill { height:100%; border-radius:99px; transition:width 0.5s; }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.22s; }
.modal-overlay.active { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:32px; width:500px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); transform:translateY(20px); transition:transform 0.25s var(--ease-out); }
.modal-overlay.active .modal { transform:translateY(0); }
.modal-title { font-family:var(--font-heading); font-size:18px; font-weight:700; margin-bottom:24px; }
.form-group { margin-bottom:18px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.06em; }
.form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); padding:10px 14px; font-size:13px; font-family:var(--font-body); outline:none; transition:var(--transition); }
.form-input:focus { border-color:var(--primary); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty-state-icon { font-size:48px; margin-bottom:16px; }
.empty-state-title { font-size:16px; font-weight:600; color:var(--text-soft); margin-bottom:8px; }

.alert-banner { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:var(--danger); font-size:13px; margin-bottom:20px; }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<nav>
  <div class="nav-logo">
    <div class="nav-logo-dot"></div>
    <a href="delhub-dashboard.html" style="color:inherit;text-decoration:none;">DelHub / v1.0</a>
  </div>
  <div class="nav-context" id="nav-context"></div>
  <div class="nav-links">
    <a href="delhub-settings.html" class="nav-icon" title="Paramètres"><span class="nav-icon-symbol">⚙</span></a>
  </div>
</nav>
<a href="#" class="ai-float-btn" id="aiFloatBtn" title="Assistant IA">🤖</a>
<div class="layout">
  <aside class="sidebar" id="delhub-sidebar"></aside>
  <div class="main-col">
  <main class="main" style="padding:32px;overflow-y:auto">

    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px">
      <div>
        <span class="hero-badge">Delivery</span>
        <h1 class="hero-title">Capacity Planning</h1>
        <p class="hero-sub">Suivi de la capacité et de l'utilisation des équipes</p>
      </div>
      <div id="addBtnWrap"></div>
    </div>

    <!-- KPI STRIP -->
    <div class="kpi-strip" id="kpiStrip"></div>

    <!-- ALERT -->
    <div id="alertsWrap"></div>

    <!-- CHART + TABLE -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
      <div class="card">
        <div style="font-family:var(--font-heading);font-size:13px;font-weight:700;margin-bottom:16px">Utilisation par équipe</div>
        <div id="capacityChart" style="width:100%;height:260px"></div>
      </div>
      <div class="card">
        <div style="font-family:var(--font-heading);font-size:13px;font-weight:700;margin-bottom:16px">Heures : Dispo vs Allouées</div>
        <div id="hoursChart" style="width:100%;height:260px"></div>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <table class="data-table" id="capacityTable">
        <thead>
          <tr>
            <th>Équipe</th>
            <th>Membres</th>
            <th>Période</th>
            <th>H. disponibles</th>
            <th>H. allouées</th>
            <th>Utilisation</th>
            <th id="actionsHeader" style="display:none">Actions</th>
          </tr>
        </thead>
        <tbody id="capacityTbody"></tbody>
      </table>
    </div>

  </main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nouvelle entrée capacité</div>
    <form id="capacityForm" autocomplete="off">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Équipe *</label>
          <input class="form-input" type="text" id="f_team" placeholder="Nom de l'équipe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Membres</label>
          <input class="form-input" type="number" id="f_members" min="1" placeholder="ex: 5">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Période</label>
        <input class="form-input" type="text" id="f_period" placeholder="ex: Mars 2026, Q1 2026...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Heures disponibles</label>
          <input class="form-input" type="number" id="f_availableHours" min="0" placeholder="ex: 800">
        </div>
        <div class="form-group">
          <label class="form-label">Heures allouées</label>
          <input class="form-input" type="number" id="f_allocatedHours" min="0" placeholder="ex: 680">
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="modalCancel">Annuler</button>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script>
(function() {
  if (typeof DELHUB === 'undefined') return;
  var canWrite = DELHUB.canWrite('capacity');
  var editingId = null;

  if (canWrite) {
    document.getElementById('addBtnWrap').innerHTML = '<button class="btn btn-primary" id="addBtn">+ Nouvelle entrée</button>';
    document.getElementById('addBtn').addEventListener('click', openAdd);
    document.getElementById('actionsHeader').style.display = '';
  }

  function getUtilColor(u) {
    if (u > 90) return '#EF4444';
    if (u > 75) return '#F59E0B';
    return '#22C55E';
  }

  function renderKPIs() {
    var items = DELHUB.getCapacity();
    var nbTeams = items.length;
    var totalDispo = items.reduce(function(s,i) { return s + (Number(i.availableHours)||0); }, 0);
    var totalAlloc = items.reduce(function(s,i) { return s + (Number(i.allocatedHours)||0); }, 0);
    var avgUtil = nbTeams ? Math.round(items.reduce(function(s,i) {
      var dispo = Number(i.availableHours)||0;
      var alloc = Number(i.allocatedHours)||0;
      return s + (dispo > 0 ? alloc/dispo*100 : 0);
    }, 0) / nbTeams) : 0;

    var kpis = [
      { label:'Équipes', value: nbTeams, sub:'dans le plan', color:'var(--text)' },
      { label:'H. disponibles', value: totalDispo+'h', sub:'capacité totale', color:'var(--primary)' },
      { label:'H. allouées', value: totalAlloc+'h', sub:'charge totale', color:'var(--warning)' },
      { label:'Taux utilisation moy.', value: avgUtil+'%', sub:'toutes équipes', color: getUtilColor(avgUtil) },
    ];
    document.getElementById('kpiStrip').innerHTML = kpis.map(function(k) {
      return '<div class="kpi-card"><div class="kpi-label">'+k.label+'</div><div class="kpi-value" style="color:'+k.color+'">'+k.value+'</div><div class="kpi-sub">'+k.sub+'</div></div>';
    }).join('');
  }

  function renderAlerts() {
    var items = DELHUB.getCapacity().filter(function(i) {
      var d = Number(i.availableHours)||0;
      var a = Number(i.allocatedHours)||0;
      return d > 0 && (a/d*100) > 90;
    });
    if (!items.length) { document.getElementById('alertsWrap').innerHTML = ''; return; }
    document.getElementById('alertsWrap').innerHTML = '<div class="alert-banner"><span style="font-size:18px">⚠️</span>' +
      '<span><strong>' + items.length + ' équipe(s) surchargée(s) (&gt;90%)</strong> : ' +
      items.map(function(i) { return i.team; }).join(', ') + '</span></div>';
  }

  function renderCharts() {
    if (typeof echarts === 'undefined') return;
    var items = DELHUB.getCapacity();
    if (!items.length) return;

    var teams = items.map(function(i) { return i.team || 'Équipe'; });
    var utils = items.map(function(i) {
      var d = Number(i.availableHours)||0;
      var a = Number(i.allocatedHours)||0;
      return d > 0 ? Math.round(a/d*100) : 0;
    });

    var chart1 = echarts.init(document.getElementById('capacityChart'));
    chart1.setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'axis', formatter: function(params) { return params[0].name + ' : ' + params[0].value + '%'; } },
      xAxis: { type:'category', data: teams, axisLabel: { color:'#9CA3AF', fontSize:10, rotate: teams.length > 4 ? 20 : 0 } },
      yAxis: { type:'value', max:100, axisLabel: { color:'#9CA3AF', formatter:'{value}%' }, splitLine: { lineStyle: { color:'rgba(255,255,255,0.06)' } } },
      series: [{
        type: 'bar', data: utils.map(function(u) { return { value:u, itemStyle:{ color: getUtilColor(u), borderRadius:[6,6,0,0] } }; }),
        barWidth:'60%'
      }],
      grid: { left:48, right:16, top:10, bottom: teams.length > 4 ? 50 : 30 }
    });

    var chart2 = echarts.init(document.getElementById('hoursChart'));
    chart2.setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'axis' },
      legend: { data:['Disponibles','Allouées'], textStyle:{ color:'#9CA3AF', fontSize:11 }, top:0 },
      xAxis: { type:'category', data: teams, axisLabel: { color:'#9CA3AF', fontSize:10, rotate: teams.length > 4 ? 20 : 0 } },
      yAxis: { type:'value', axisLabel:{ color:'#9CA3AF' }, splitLine:{ lineStyle:{ color:'rgba(255,255,255,0.06)' } } },
      series: [
        { name:'Disponibles', type:'bar', data: items.map(function(i) { return Number(i.availableHours)||0; }), itemStyle:{ color:'rgba(45,212,191,0.5)', borderRadius:[4,4,0,0] }, barWidth:'35%' },
        { name:'Allouées', type:'bar', data: items.map(function(i) { return Number(i.allocatedHours)||0; }), itemStyle:{ color:'rgba(245,158,11,0.7)', borderRadius:[4,4,0,0] }, barWidth:'35%' }
      ],
      grid: { left:48, right:16, top:32, bottom: teams.length > 4 ? 50 : 30 }
    });

    window.addEventListener('resize', function() { chart1.resize(); chart2.resize(); });
  }

  function renderTable() {
    var items = DELHUB.getCapacity();
    if (!items.length) {
      document.getElementById('capacityTbody').innerHTML =
        '<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">👥</div>' +
        '<div class="empty-state-title">Aucune donnée de capacité</div>' +
        '<p>Ajoutez vos équipes pour commencer le suivi.</p></div></td></tr>';
      return;
    }
    document.getElementById('capacityTbody').innerHTML = items.map(function(item) {
      var dispo = Number(item.availableHours)||0;
      var alloc = Number(item.allocatedHours)||0;
      var util = dispo > 0 ? Math.round(alloc/dispo*100) : 0;
      var isOver = util > 90;
      var color = getUtilColor(util);
      return '<tr class="'+(isOver?'row-overloaded':'')+'">' +
        '<td><strong>' + (item.team||'—') + '</strong>' + (isOver ? ' <span style="color:var(--danger);font-size:11px">⚠ Surchargé</span>':'') + '</td>' +
        '<td style="text-align:center;font-family:var(--font-mono)">' + (item.members||'—') + '</td>' +
        '<td style="color:var(--text-muted);font-size:12px">' + (item.period||'—') + '</td>' +
        '<td style="font-family:var(--font-mono)">' + dispo + 'h</td>' +
        '<td style="font-family:var(--font-mono)">' + alloc + 'h</td>' +
        '<td>' +
          '<div style="display:flex;align-items:center;gap:10px">' +
            '<div class="util-bar-wrap"><div class="util-bar-fill" style="width:'+Math.min(util,100)+'%;background:'+color+'"></div></div>' +
            '<span style="font-size:12px;font-family:var(--font-mono);font-weight:700;color:'+color+'">'+util+'%</span>' +
          '</div>' +
        '</td>' +
        (canWrite ?
          '<td><div style="display:flex;gap:6px">' +
            '<button class="btn btn-ghost btn-sm" onclick="CAP_PAGE.edit('+item.id+')">Éditer</button>' +
            '<button class="btn btn-danger btn-sm" onclick="CAP_PAGE.del('+item.id+')">Suppr.</button>' +
          '</div></td>' : '') +
      '</tr>';
    }).join('');
  }

  function openAdd() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Nouvelle entrée capacité';
    document.getElementById('capacityForm').reset();
    document.getElementById('modalOverlay').classList.add('active');
  }

  function openEdit(id) {
    var item = DELHUB.getCapacity().find(function(i) { return i.id === id; });
    if (!item) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Éditer la capacité';
    document.getElementById('f_team').value = item.team || '';
    document.getElementById('f_members').value = item.members || '';
    document.getElementById('f_period').value = item.period || '';
    document.getElementById('f_availableHours').value = item.availableHours || '';
    document.getElementById('f_allocatedHours').value = item.allocatedHours || '';
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    editingId = null;
  }

  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

  document.getElementById('capacityForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var availH = Number(document.getElementById('f_availableHours').value)||0;
    var allocH = Number(document.getElementById('f_allocatedHours').value)||0;
    var data = {
      team: document.getElementById('f_team').value.trim(),
      members: Number(document.getElementById('f_members').value)||0,
      period: document.getElementById('f_period').value.trim(),
      availableHours: availH,
      allocatedHours: allocH,
      utilization: availH > 0 ? Math.round(allocH/availH*100) : 0,
    };
    if (!data.team) return;
    if (editingId) { DELHUB.updateCapacityEntry(editingId, data); }
    else { DELHUB.addCapacityEntry(data); }
    closeModal();
    refresh();
  });

  window.CAP_PAGE = {
    edit: openEdit,
    del: function(id) {
      if (confirm('Supprimer cette entrée ?')) {
        DELHUB.deleteCapacityEntry(id);
        refresh();
      }
    }
  };

  function refresh() {
    renderKPIs();
    renderAlerts();
    renderCharts();
    renderTable();
  }

  refresh();
})();
</script>
<script>
window.HUB_AI_PAGE = {
  pageId: 'delhub-capacity',
  title: 'IA Capacite',
  icon: '\u2699\uFE0F',
  suggestions: [
    'Prevision de charge a 1 mois',
    'Risques de surcharge equipe',
    'Recommandations d\'allocation',
    'Optimisation de la capacite'
  ],
  buildContext: function() {
    if (typeof DELHUB === 'undefined') return '';
    var cap = DELHUB.getCapacity ? DELHUB.getCapacity() : [];
    var lines = ['=== CAPACITE DELIVERY ==='];
    lines.push('Entrees: '+cap.length);
    cap.slice(0,10).forEach(function(c) {
      lines.push('- '+(c.team||c.name||'?')+': charge='+(c.load||c.utilization||'?')+'%, dispo='+(c.available||'?'));
    });
    return lines.join('\n');
  },
  predictions: function() {
    return 'Analyse la capacite delivery: 1) Prevision de charge a 1 mois 2) Equipes en surcharge avec risques 3) Capacite disponible par competence 4) Recommandations d\'allocation 5) Alertes de sous-effectif';
  },
  importPrompt: 'Analyse ce document de capacite/planning et extrais: equipes, charge, disponibilite. Genere un JSON avec: entries (array of {team, role, utilization, available, period}).',
  importHandler: function(data) {
    if (typeof DELHUB === 'undefined' || !data.entries) return;
    data.entries.forEach(function(e) {
      if (DELHUB.saveCapacityEntry) DELHUB.saveCapacityEntry(e);
    });
  }
};
</script>
<script src="hub-ai-widget.js"></script>
</body>
</html>
