<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DelHub — SLA & Engagements</title>
<link rel="stylesheet" href="themes/hub-theme.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="hub-data.js"></script>
<script src="hub-nav-context.js"></script>
<script src="hub-sidebar.js"></script>
<script src="hub-mini-chat.js"></script>
<style>
.kpi-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
.kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; transition:var(--transition); }
.kpi-card:hover { border-color:var(--border-active); transform:translateY(-2px); }
.kpi-label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-family:var(--font-mono); margin-bottom:8px; }
.kpi-value { font-size:28px; font-weight:700; font-family:var(--font-heading); }
.kpi-sub { font-size:11px; color:var(--text-soft); margin-top:4px; }

.toolbar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
.toolbar-spacer { flex:1; }
select, input[type=text] { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); padding:8px 12px; font-size:13px; font-family:var(--font-body); outline:none; transition:var(--transition); }
select:focus, input[type=text]:focus { border-color:var(--primary); }

.btn { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:var(--transition); font-family:var(--font-body); }
.btn-primary { background:var(--primary); color:#0B0F19; }
.btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
.btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--primary); color:var(--primary); }
.btn-danger { background:rgba(239,68,68,0.12); color:var(--danger); border:1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background:rgba(239,68,68,0.22); }
.btn-sm { padding:5px 12px; font-size:12px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.data-table { width:100%; border-collapse:collapse; }
.data-table th { text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); padding:12px 16px; border-bottom:1px solid var(--border); font-family:var(--font-mono); }
.data-table td { padding:13px 16px; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); vertical-align:middle; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tbody tr { transition:var(--transition); }
.data-table tbody tr:hover { background:var(--surface2); }
.data-table tbody tr.row-breached { border-left:3px solid var(--danger); background:rgba(239,68,68,0.04); }
.data-table tbody tr.row-breached:hover { background:rgba(239,68,68,0.08); }

.badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; font-family:var(--font-mono); letter-spacing:0.04em; }
.badge-met { background:rgba(34,197,94,0.15); color:var(--success); }
.badge-at_risk { background:rgba(245,158,11,0.15); color:var(--warning); }
.badge-breached { background:rgba(239,68,68,0.18); color:var(--danger); }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.22s; }
.modal-overlay.active { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:32px; width:500px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); transform:translateY(20px); transition:transform 0.25s var(--ease-out); }
.modal-overlay.active .modal { transform:translateY(0); }
.modal-title { font-family:var(--font-heading); font-size:18px; font-weight:700; margin-bottom:24px; }
.form-group { margin-bottom:18px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.06em; }
.form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); padding:10px 14px; font-size:13px; font-family:var(--font-body); outline:none; transition:var(--transition); }
.form-input:focus { border-color:var(--primary); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty-state-icon { font-size:48px; margin-bottom:16px; }
.empty-state-title { font-size:16px; font-weight:600; color:var(--text-soft); margin-bottom:8px; }

.alert-banner { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:var(--danger); font-size:13px; margin-bottom:20px; }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<nav>
  <div class="nav-logo">
    <div class="nav-logo-dot"></div>
    <a href="delhub-dashboard.html" style="color:inherit;text-decoration:none;">DelHub / v1.0</a>
  </div>
  <div class="nav-context" id="nav-context"></div>
  <div class="nav-links">
    <a href="delhub-settings.html" class="nav-icon" title="Paramètres"><span class="nav-icon-symbol">⚙</span></a>
  </div>
</nav>
<a href="#" class="ai-float-btn" id="aiFloatBtn" title="Assistant IA">🤖</a>
<div class="layout">
  <aside class="sidebar" id="delhub-sidebar"></aside>
  <div class="main-col">
  <main class="main" style="padding:32px;overflow-y:auto">

    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px">
      <div>
        <span class="hero-badge">Delivery</span>
        <h1 class="hero-title">SLA & Engagements</h1>
        <p class="hero-sub">Suivi des accords de niveau de service et des engagements clients</p>
      </div>
      <div id="addBtnWrap"></div>
    </div>

    <!-- KPI STRIP -->
    <div class="kpi-strip" id="kpiStrip"></div>

    <!-- BREACH ALERTS -->
    <div id="alertsWrap"></div>

    <!-- CHART + TABLE ROW -->
    <div style="display:grid;grid-template-columns:320px 1fr;gap:20px;margin-bottom:24px;align-items:start">
      <div class="card" style="padding:20px">
        <div style="font-family:var(--font-heading);font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)">Compliance SLA Globale</div>
        <div id="gaugeChart" style="width:100%;height:220px"></div>
        <div id="gaugeLegend" style="display:flex;gap:12px;justify-content:center;margin-top:8px;flex-wrap:wrap"></div>
      </div>
      <div>
        <!-- TOOLBAR -->
        <div class="toolbar">
          <select id="filterStatus">
            <option value="">Tous les statuts</option>
            <option value="met">Met</option>
            <option value="at_risk">At Risk</option>
            <option value="breached">Breached</option>
          </select>
          <div class="toolbar-spacer"></div>
          <span id="countLabel" style="font-size:12px;color:var(--text-muted)"></span>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <table class="data-table" id="slaTable">
            <thead>
              <tr>
                <th>Client</th>
                <th>SLA</th>
                <th>Cible</th>
                <th>Réel</th>
                <th>Unité</th>
                <th>Statut</th>
                <th>Dernière mesure</th>
                <th id="actionsHeader" style="display:none">Actions</th>
              </tr>
            </thead>
            <tbody id="slaTbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nouvel engagement SLA</div>
    <form id="slaForm" autocomplete="off">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Client *</label>
          <input class="form-input" type="text" id="f_client" placeholder="Nom du client" required>
        </div>
        <div class="form-group">
          <label class="form-label">Contrat ID</label>
          <input class="form-input" type="text" id="f_contractId" placeholder="ID contrat">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nom du SLA *</label>
        <input class="form-input" type="text" id="f_slaName" placeholder="ex: Disponibilité, Temps de réponse..." required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cible</label>
          <input class="form-input" type="number" id="f_target" step="0.01" placeholder="ex: 99.5">
        </div>
        <div class="form-group">
          <label class="form-label">Réel (actual)</label>
          <input class="form-input" type="number" id="f_actual" step="0.01" placeholder="ex: 98.2">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Unité</label>
          <input class="form-input" type="text" id="f_unit" placeholder="%, min, h, jours...">
        </div>
        <div class="form-group">
          <label class="form-label">Statut</label>
          <select class="form-input" id="f_status">
            <option value="met">Met</option>
            <option value="at_risk">At Risk</option>
            <option value="breached">Breached</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Dernière mesure</label>
        <input class="form-input" type="date" id="f_lastMeasured">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="modalCancel">Annuler</button>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script>
(function() {
  if (typeof DELHUB === 'undefined') return;
  var canWrite = DELHUB.canWrite('engagements');
  var editingId = null;

  if (canWrite) {
    document.getElementById('addBtnWrap').innerHTML = '<button class="btn btn-primary" id="addBtn">+ Nouvel engagement</button>';
    document.getElementById('addBtn').addEventListener('click', openAdd);
    document.getElementById('actionsHeader').style.display = '';
  }

  function renderKPIs() {
    var items = DELHUB.getEngagements();
    var total = items.length;
    var met = items.filter(function(i) { return i.status === 'met'; }).length;
    var atRisk = items.filter(function(i) { return i.status === 'at_risk'; }).length;
    var breached = items.filter(function(i) { return i.status === 'breached'; }).length;
    var compliance = total ? Math.round(met / total * 100) : 100;
    var kpis = [
      { label:'Compliance SLA', value: compliance+'%', sub: met+' respectés sur '+total, color: compliance >= 90 ? 'var(--success)' : compliance >= 70 ? 'var(--warning)' : 'var(--danger)' },
      { label:'Met', value: met, sub:'conformes', color:'var(--success)' },
      { label:'At Risk', value: atRisk, sub:'à surveiller', color:'var(--warning)' },
      { label:'Breached', value: breached, sub:'non conformes', color:'var(--danger)' },
    ];
    document.getElementById('kpiStrip').innerHTML = kpis.map(function(k) {
      return '<div class="kpi-card"><div class="kpi-label">'+k.label+'</div><div class="kpi-value" style="color:'+k.color+'">'+k.value+'</div><div class="kpi-sub">'+k.sub+'</div></div>';
    }).join('');
  }

  function renderAlerts() {
    var items = DELHUB.getEngagements().filter(function(i) { return i.status === 'breached'; });
    if (!items.length) { document.getElementById('alertsWrap').innerHTML = ''; return; }
    document.getElementById('alertsWrap').innerHTML = '<div class="alert-banner"><span style="font-size:18px">🚨</span>' +
      '<span><strong>' + items.length + ' SLA breached</strong> — ' +
      items.map(function(i) { return (i.client||'?') + ' / ' + (i.slaName||'?'); }).join(', ') + '</span></div>';
  }

  function renderGauge() {
    if (typeof echarts === 'undefined') return;
    var items = DELHUB.getEngagements();
    var total = items.length;
    var met = items.filter(function(i) { return i.status === 'met'; }).length;
    var atRisk = items.filter(function(i) { return i.status === 'at_risk'; }).length;
    var breached = items.filter(function(i) { return i.status === 'breached'; }).length;
    var compliance = total ? Math.round(met / total * 100) : 100;

    var chart = echarts.init(document.getElementById('gaugeChart'));
    chart.setOption({
      backgroundColor: 'transparent',
      series: [{
        type: 'gauge',
        radius: '90%',
        startAngle: 210, endAngle: -30,
        min: 0, max: 100,
        pointer: { show: true, length: '60%', width: 4, itemStyle: { color: '#2DD4BF' } },
        progress: { show: true, width: 14, roundCap: true, itemStyle: { color: compliance >= 90 ? '#22C55E' : compliance >= 70 ? '#F59E0B' : '#EF4444' } },
        axisLine: { lineStyle: { width: 14, color: [[1, 'rgba(255,255,255,0.08)']] } },
        axisTick: { show: false },
        splitLine: { show: false },
        axisLabel: { show: false },
        detail: { formatter: '{value}%', color: '#E5E7EB', fontSize: 22, fontWeight: 700, fontFamily: 'Plus Jakarta Sans', offsetCenter: [0, '60%'] },
        data: [{ value: compliance, name: 'Compliance' }],
        title: { fontSize: 12, color: '#9CA3AF', offsetCenter: [0, '80%'] }
      }]
    });

    document.getElementById('gaugeLegend').innerHTML =
      '<span style="font-size:11px;color:var(--success)">● Met: '+met+'</span>' +
      '<span style="font-size:11px;color:var(--warning)">● At risk: '+atRisk+'</span>' +
      '<span style="font-size:11px;color:var(--danger)">● Breached: '+breached+'</span>';
  }

  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
  }

  function renderTable() {
    var items = DELHUB.getEngagements();
    var status = document.getElementById('filterStatus').value;
    if (status) items = items.filter(function(i) { return i.status === status; });
    document.getElementById('countLabel').textContent = items.length + ' engagement(s)';

    var statusLabels = { met:'Met', at_risk:'At Risk', breached:'Breached' };
    if (!items.length) {
      document.getElementById('slaTbody').innerHTML =
        '<tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">📊</div>' +
        '<div class="empty-state-title">Aucun engagement SLA</div>' +
        '<p>Ajoutez vos premiers engagements de service.</p></div></td></tr>';
      return;
    }
    document.getElementById('slaTbody').innerHTML = items.map(function(item) {
      var isBreached = item.status === 'breached';
      var actual = Number(item.actual);
      var target = Number(item.target);
      var colorActual = isBreached ? 'var(--danger)' : item.status === 'at_risk' ? 'var(--warning)' : 'var(--success)';
      return '<tr class="'+(isBreached?'row-breached':'')+'">' +
        '<td><strong>' + (item.client||'—') + '</strong></td>' +
        '<td style="color:var(--text-muted)">' + (item.slaName||'—') + '</td>' +
        '<td style="font-family:var(--font-mono);font-size:12px">' + (item.target||'—') + '</td>' +
        '<td style="font-family:var(--font-mono);font-size:12px;color:'+colorActual+';font-weight:600">' + (item.actual||'—') + (isBreached?' 🚨':'') + '</td>' +
        '<td style="color:var(--text-muted);font-size:12px">' + (item.unit||'—') + '</td>' +
        '<td><span class="badge badge-'+(item.status||'met')+'">'+( statusLabels[item.status]||item.status||'—')+'</span></td>' +
        '<td style="color:var(--text-muted)">' + formatDate(item.lastMeasured) + '</td>' +
        (canWrite ?
          '<td><div style="display:flex;gap:6px">' +
            '<button class="btn btn-ghost btn-sm" onclick="SLA_PAGE.edit(\''+item.id+'\')">Éditer</button>' +
            '<button class="btn btn-danger btn-sm" onclick="SLA_PAGE.del(\''+item.id+'\')">Suppr.</button>' +
          '</div></td>' : '') +
      '</tr>';
    }).join('');
  }

  function openAdd() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Nouvel engagement SLA';
    document.getElementById('slaForm').reset();
    document.getElementById('modalOverlay').classList.add('active');
  }

  function openEdit(id) {
    var item = DELHUB.getEngagements().find(function(i) { return i.id === id; });
    if (!item) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Éditer engagement SLA';
    document.getElementById('f_client').value = item.client || '';
    document.getElementById('f_contractId').value = item.contractId || '';
    document.getElementById('f_slaName').value = item.slaName || '';
    document.getElementById('f_target').value = item.target || '';
    document.getElementById('f_actual').value = item.actual || '';
    document.getElementById('f_unit').value = item.unit || '';
    document.getElementById('f_status').value = item.status || 'met';
    document.getElementById('f_lastMeasured').value = item.lastMeasured ? item.lastMeasured.substring(0,10) : '';
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    editingId = null;
  }

  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

  document.getElementById('slaForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var data = {
      client: document.getElementById('f_client').value.trim(),
      contractId: document.getElementById('f_contractId').value.trim(),
      slaName: document.getElementById('f_slaName').value.trim(),
      target: document.getElementById('f_target').value,
      actual: document.getElementById('f_actual').value,
      unit: document.getElementById('f_unit').value.trim(),
      status: document.getElementById('f_status').value,
      lastMeasured: document.getElementById('f_lastMeasured').value || null,
    };
    if (!data.client || !data.slaName) return;
    if (editingId) { DELHUB.updateEngagement(editingId, data); }
    else { DELHUB.addEngagement(data); }
    closeModal();
    refresh();
  });

  document.getElementById('filterStatus').addEventListener('change', renderTable);

  window.SLA_PAGE = {
    edit: openEdit,
    del: function(id) {
      if (confirm('Supprimer cet engagement SLA ?')) {
        DELHUB.deleteEngagement(id);
        refresh();
      }
    }
  };

  function refresh() {
    renderKPIs();
    renderAlerts();
    renderGauge();
    renderTable();
  }

  refresh();
})();
</script>
<script>
window.HUB_AI_PAGE = {
  pageId: 'delhub-sla',
  title: 'IA SLA & Engagements',
  icon: '\u{1F3AF}',
  suggestions: [
    'Prediction de breach SLA a 30 jours',
    'Impact financier des penalites',
    'Causes racines des SLA at risk',
    'Plan d\'action conformite SLA'
  ],
  buildContext: function() {
    if (typeof DELHUB === 'undefined') return '';
    var eng = DELHUB.getEngagements();
    var inc = DELHUB.getIncidents();
    var lines = ['=== SLA & ENGAGEMENTS (' + eng.length + ') ==='];
    eng.forEach(function(e) {
      lines.push('- Client: ' + (e.client||'?') + ' | SLA: ' + (e.slaName||e.name||e.service||'?') + ' | cible=' + (e.target||'?') + ' ' + (e.unit||'') + ' | actuel=' + (e.actual||e.current||'?') + ' | statut=' + (e.status||'?'));
    });
    var open = inc.filter(function(i){ return i.status==='open'||i.status==='investigating'; });
    lines.push('\n=== INCIDENTS (' + inc.length + ' total, ' + open.length + ' ouverts) ===');
    inc.slice(0,15).forEach(function(i) {
      lines.push('- ' + (i.title||i.name||'?') + ': severite=' + (i.severity||i.priority||'?') + ', statut=' + (i.status||'?') + ', client=' + (i.client||'?') + ', date=' + (i.createdAt||i.date||'?'));
    });
    return lines.join('\n');
  },
  predictions: function() {
    return 'Analyse mes SLA et engagements, puis donne: 1) Taux de conformite actuel et tendance 2) Prediction de breach dans les 30/60/90 jours avec probabilite 3) Impact financier estime des penalites 4) Top 3 SLA les plus a risque avec causes 5) Correlation incidents / degradation SLA 6) Plan d\'action prioritaire avec responsables 7) Benchmark vs standards du marche';
  },
  importPrompt: 'Analyse ce document SLA/contrat de service et extrais: services couverts, KPIs, seuils de performance, penalites, frequence de reporting, conditions d\'escalade. Genere un JSON avec les champs: name, service, target, unit, penalty, frequency, status.',
  importHandler: function(data) {
    if (typeof DELHUB === 'undefined') return;
    var eng = DELHUB.getEngagements();
    var now = Date.now();
    var count = 0;

    function addItem(d) {
      var item = {
        id: 'sla-' + (now++) + '-' + Math.random().toString(36).substr(2,4),
        client: d.client || d.fournisseur || d.provider || '—',
        contractId: d.contractId || d.reference || d.ref || '',
        slaName: d.slaName || d.name || d.service_name || d.kpi || '—',
        target: d.target != null ? d.target : (d.cible || ''),
        actual: d.actual != null ? d.actual : (d.current || d.actuel || ''),
        unit: d.unit || d.unite || '',
        status: d.status || 'met',
        penalty: d.penalty || d.penalite || '',
        lastMeasured: d.lastMeasured || new Date().toISOString().substring(0,10)
      };
      eng.push(item);
      count++;
    }

    // Cas 1 : tableau direct d'engagements
    if (Array.isArray(data)) {
      data.forEach(addItem);
    }
    // Cas 2 : objet avec sous-tableau (service, services, kpis, engagements)
    else if (data && typeof data === 'object') {
      var subArray = data.service || data.services || data.kpis || data.engagements || data.items;
      if (Array.isArray(subArray)) {
        var parentClient = data.client || data.fournisseur || data.provider || '';
        var parentRef = data.contractId || data.reference || data.ref || data.name || '';
        subArray.forEach(function(d) {
          d.client = d.client || parentClient;
          d.contractId = d.contractId || parentRef;
          addItem(d);
        });
      } else {
        addItem(data);
      }
    }

    DELHUB.saveEngagements(eng);
    console.log('[SLA Import] ' + count + ' engagement(s) importes');
