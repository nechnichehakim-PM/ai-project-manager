<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Unifie — Connexion</title>
<link rel="stylesheet" href="themes/hub-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: var(--shadow);
  position: relative;
  z-index: 1;
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
}
.login-logo-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--primary);
  box-shadow: 0 0 12px var(--primary-glow);
}
.login-logo-text {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--text);
  letter-spacing: -0.02em;
}
.login-logo-version {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.login-title {
  font-family: var(--font-heading);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.login-subtitle {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.login-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 28px;
}
.login-tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-muted);
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
  background: transparent;
  font-family: var(--font-body);
}
.login-tab.active {
  background: var(--surface3);
  color: var(--text);
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  color: var(--text);
  font-size: 0.9rem;
  font-family: var(--font-body);
  outline: none;
  transition: border-color var(--transition);
  box-sizing: border-box;
}
.form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.form-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  color: var(--text);
  font-size: 0.9rem;
  font-family: var(--font-body);
  outline: none;
  cursor: pointer;
  box-sizing: border-box;
}
.form-select option { background: var(--surface); color: var(--text); }
.btn-primary {
  width: 100%;
  background: var(--primary);
  color: #0B0F19;
  border: none;
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  margin-top: 8px;
  transition: all var(--transition);
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.login-error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 0.82rem;
  color: var(--danger);
  margin-top: 12px;
  display: none;
}
.login-success {
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 0.82rem;
  color: var(--success);
  margin-top: 12px;
  display: none;
}
.login-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-soft);
}
.orb { position:fixed; border-radius:50%; filter:blur(130px); pointer-events:none; z-index:0; }
.orb-1 { width:500px; height:500px; background:rgba(129,140,248,0.06); top:-150px; right:-100px; }
.orb-2 { width:400px; height:400px; background:rgba(99,102,241,0.04); bottom:50px; left:-100px; }
/* Role chips in signup */
.role-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 4px;
}
.role-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  background: transparent;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.82rem;
  text-align: left;
}
.role-chip:hover { border-color: var(--primary); background: rgba(129,140,248,0.05); }
.role-chip.selected { border-color: var(--primary); background: rgba(129,140,248,0.12); }
.role-chip-icon { font-size: 16px; }
.role-chip-name { font-weight: 600; }
.role-chip-desc { font-size: 0.7rem; color: var(--text-muted); }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-dot"></div>
      <div>
        <div class="login-logo-text">Hub Platform</div>
        <div class="login-logo-version">v2.0 · Unified</div>
      </div>
    </div>

    <div class="login-title" id="loginTitle">Connexion</div>
    <div class="login-subtitle" id="loginSubtitle">Accedez a votre espace de pilotage</div>

    <div class="login-tabs">
      <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">Connexion</button>
      <button class="login-tab" id="tabSignup" onclick="switchTab('signup')">Creer un compte</button>
    </div>

    <!-- ── LOGIN ── -->
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="vous@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btnLogin" onclick="doLogin()">Se connecter</button>
      <div class="login-error" id="loginError"></div>
    </div>

    <!-- ── SIGNUP ── -->
    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="signupEmail" placeholder="vous@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" id="signupPassword" placeholder="Minimum 6 caracteres" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Votre role</label>
        <div class="role-grid" id="roleGrid">
          <button type="button" class="role-chip selected" data-role="pm" onclick="selectRole(this)">
            <span class="role-chip-icon">&#x1F4CB;</span>
            <div><div class="role-chip-name">Chef de Projet</div><div class="role-chip-desc">Gestion de projets</div></div>
          </button>
          <button type="button" class="role-chip" data-role="delivery" onclick="selectRole(this)">
            <span class="role-chip-icon">&#x1F680;</span>
            <div><div class="role-chip-name">Delivery</div><div class="role-chip-desc">Delivery Manager</div></div>
          </button>
          <button type="button" class="role-chip" data-role="business" onclick="selectRole(this)">
            <span class="role-chip-icon">&#x1F4BC;</span>
            <div><div class="role-chip-name">Business</div><div class="role-chip-desc">Business Manager</div></div>
          </button>
          <button type="button" class="role-chip" data-role="sales" onclick="selectRole(this)">
            <span class="role-chip-icon">&#x1F4B0;</span>
            <div><div class="role-chip-name">Sales</div><div class="role-chip-desc">Commercial</div></div>
          </button>
          <button type="button" class="role-chip" data-role="head" onclick="selectRole(this)">
            <span class="role-chip-icon">&#x1F451;</span>
            <div><div class="role-chip-name">Head</div><div class="role-chip-desc">Direction / C-Level</div></div>
          </button>
        </div>
      </div>
      <button class="btn-primary" id="btnSignup" onclick="doSignup()">Creer mon compte</button>
      <div class="login-error" id="signupError"></div>
      <div class="login-success" id="signupSuccess"></div>
    </div>

    <!-- ── MODE DEMO ── -->
    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
      <div style="font-size:0.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;text-align:center">Mode Demo (sans compte)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px" id="demoRoles">
        <button class="role-chip" onclick="demoLogin('god')" style="flex-direction:column;align-items:center;text-align:center;padding:8px 4px">
          <span style="font-size:18px">&#x1F451;</span>
          <span class="role-chip-name" style="font-size:0.72rem">GOD</span>
        </button>
        <button class="role-chip" onclick="demoLogin('pm')" style="flex-direction:column;align-items:center;text-align:center;padding:8px 4px">
          <span style="font-size:18px">&#x1F4CB;</span>
          <span class="role-chip-name" style="font-size:0.72rem">CDP</span>
        </button>
        <button class="role-chip" onclick="demoLogin('delivery')" style="flex-direction:column;align-items:center;text-align:center;padding:8px 4px">
          <span style="font-size:18px">&#x1F680;</span>
          <span class="role-chip-name" style="font-size:0.72rem">Delivery</span>
        </button>
        <button class="role-chip" onclick="demoLogin('business')" style="flex-direction:column;align-items:center;text-align:center;padding:8px 4px">
          <span style="font-size:18px">&#x1F4BC;</span>
          <span class="role-chip-name" style="font-size:0.72rem">Business</span>
        </button>
        <button class="role-chip" onclick="demoLogin('sales')" style="flex-direction:column;align-items:center;text-align:center;padding:8px 4px">
          <span style="font-size:18px">&#x1F4B0;</span>
          <span class="role-chip-name" style="font-size:0.72rem">Sales</span>
        </button>
        <button class="role-chip" onclick="demoLogin('head')" style="flex-direction:column;align-items:center;text-align:center;padding:8px 4px">
          <span style="font-size:18px">&#x1F3AF;</span>
          <span class="role-chip-name" style="font-size:0.72rem">Head</span>
        </button>
      </div>
    </div>

    <div class="login-footer">Hub Platform · Abdelhakim Nechniche · PMP&reg; · PRINCE2 7th</div>
  </div>
</div>

<script>
  var _sbClient = null;
  var _selectedRole = 'pm';

  function getClient() {
    if (!_sbClient) {
      _sbClient = window.supabase.createClient(
        'https://zflbgbxljwdartcfhpdr.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmbGJnYnhsandkYXJ0Y2ZocGRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjMwMTYsImV4cCI6MjA5MDA5OTAxNn0.1P1kpRs6cB_DmldC1c1_B2CQtIHFwovgXFdfPSr29jY',
        { auth: { persistSession: true, autoRefreshToken: true } }
      );
    }
    return _sbClient;
  }

  // Default pages per role (must match hub-data.js HUB_DEFAULT_PAGE)
  var DEFAULT_PAGES = {
    god:      'pm-hub.html',
    pm:       'pm-hub.html',
    delivery: 'delhub-dashboard.html',
    business: 'delhub-contracts.html',
    sales:    'delhub-crm.html',
    head:     'pm-hub.html'
  };

  // Check if already logged in
  getClient().auth.getSession().then(function (r) {
    if (r.data.session) {
      redirectByRole();
    }
  });

  function redirectByRole() {
    var profile = {};
    try {
      profile = JSON.parse(
        localStorage.getItem('hub_profile') ||
        localStorage.getItem('delhub_profile') ||
        localStorage.getItem('pmhub_profile') || '{}'
      );
    } catch(e) {}
    var role = profile.role || 'pm';
    window.location.href = DEFAULT_PAGES[role] || 'pm-hub.html';
  }

  function selectRole(btn) {
    document.querySelectorAll('.role-chip').forEach(function(el) { el.classList.remove('selected'); });
    btn.classList.add('selected');
    _selectedRole = btn.getAttribute('data-role');
  }

  function switchTab(tab) {
    var isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabSignup').classList.toggle('active', !isLogin);
    document.getElementById('loginForm').style.display   = isLogin ? '' : 'none';
    document.getElementById('signupForm').style.display  = isLogin ? 'none' : '';
    document.getElementById('loginTitle').textContent    = isLogin ? 'Connexion' : 'Creer un compte';
    document.getElementById('loginSubtitle').textContent = isLogin
      ? 'Accedez a votre espace de pilotage'
      : 'Commencez a piloter votre activite';
  }

  function showError(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearMessages() {
    ['loginError', 'signupError', 'signupSuccess'].forEach(function (id) {
      document.getElementById(id).style.display = 'none';
    });
  }

  function doLogin() {
    clearMessages();
    var email    = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;
    var btn      = document.getElementById('btnLogin');
    if (!email || !password) { showError('loginError', 'Veuillez remplir tous les champs.'); return; }

    btn.disabled = true;
    btn.textContent = 'Connexion...';

    getClient().auth.signInWithPassword({ email: email, password: password })
      .then(function (r) {
        if (r.error) throw r.error;

        // Load profile from cloud (try hub_profile first, then delhub_profile)
        return getClient()
          .from('pmhub_data')
          .select('key, value')
          .eq('user_id', r.data.user.id)
          .in('key', ['hub_profile', 'delhub_profile', 'pmhub_profile'])
          .then(function(profileRes) {
            if (profileRes.data && profileRes.data.length) {
              profileRes.data.forEach(function(row) {
                try { localStorage.setItem(row.key, JSON.stringify(row.value)); } catch(e) {}
              });
            }
            redirectByRole();
          })
          .catch(function() {
            redirectByRole();
          });
      })
      .catch(function (err) {
        showError('loginError', err.message || 'Identifiants incorrects.');
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      });
  }

  function doSignup() {
    clearMessages();
    var email    = document.getElementById('signupEmail').value.trim();
    var password = document.getElementById('signupPassword').value;
    var role     = _selectedRole;
    var btn      = document.getElementById('btnSignup');
    if (!email || !password) { showError('signupError', 'Veuillez remplir tous les champs.'); return; }
    if (password.length < 6)  { showError('signupError', 'Le mot de passe doit contenir au moins 6 caracteres.'); return; }

    btn.disabled = true;
    btn.textContent = 'Creation...';

    getClient().auth.signUp({ email: email, password: password })
      .then(function (r) {
        if (r.error) throw r.error;

        // Save profile under unified key + legacy keys
        var profile = { name: email.split('@')[0], email: email, role: role, org: '' };
        localStorage.setItem('hub_profile', JSON.stringify(profile));
        localStorage.setItem('delhub_profile', JSON.stringify(profile));

        if (r.data.user && !r.data.user.email_confirmed_at) {
          var success = document.getElementById('signupSuccess');
          success.textContent = 'Compte cree ! Verifiez votre email pour confirmer, puis connectez-vous.';
          success.style.display = 'block';
        } else {
          // Auto-confirmed — save to cloud and redirect
          var upserts = [
            { user_id: r.data.user.id, key: 'hub_profile', value: profile, updated_at: new Date().toISOString() },
            { user_id: r.data.user.id, key: 'delhub_profile', value: profile, updated_at: new Date().toISOString() }
          ];
          getClient().from('pmhub_data').upsert(upserts, { onConflict: 'user_id,key' });
          redirectByRole();
        }

        btn.disabled = false;
        btn.textContent = 'Creer mon compte';
      })
      .catch(function (err) {
        showError('signupError', err.message || 'Erreur lors de la creation du compte.');
        btn.disabled = false;
        btn.textContent = 'Creer mon compte';
      });
  }
