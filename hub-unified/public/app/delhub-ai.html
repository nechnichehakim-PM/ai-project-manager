<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DelHub — Centre IA</title>
<link rel="stylesheet" href="themes/hub-theme.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="hub-data.js"></script>
<script src="hub-nav-context.js"></script>
<script src="hub-sidebar.js"></script>
<style>
/* Layout full-height */
html, body { height:100%; }
.layout { height:calc(100vh - 56px); }
.main-col { display:flex; flex-direction:column; overflow:hidden; }
.main { display:flex; flex-direction:column; padding:0 !important; overflow:hidden !important; height:100%; }

/* Chat */
.chat-wrapper { display:flex; flex-direction:column; height:100%; }
.chat-header {
  padding:20px 28px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.chat-title { font-family:var(--font-heading); font-size:18px; font-weight:700; }
.chat-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }

.suggestions-bar {
  padding:12px 28px;
  display:flex; flex-wrap:wrap; gap:8px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.suggestion-chip {
  padding:6px 14px; background:var(--surface2); border:1px solid var(--border);
  border-radius:20px; font-size:12px; color:var(--text-soft); cursor:pointer;
  transition:var(--transition); font-family:var(--font-body);
}
.suggestion-chip:hover { border-color:var(--primary); color:var(--primary); }

.messages-area {
  flex:1; overflow-y:auto; padding:24px 28px;
  display:flex; flex-direction:column; gap:16px;
}
.message { display:flex; flex-direction:column; max-width:75%; }
.message.user { align-self:flex-end; align-items:flex-end; }
.message.ai   { align-self:flex-start; align-items:flex-start; }
.message.error { align-self:flex-start; align-items:flex-start; }

.msg-bubble {
  padding:12px 16px; border-radius:16px; font-size:14px; line-height:1.65;
  font-family:var(--font-body); white-space:pre-wrap; word-break:break-word;
}
.message.user  .msg-bubble { background:var(--primary); color:#0B0F19; border-radius:16px 4px 16px 16px; }
.message.ai    .msg-bubble { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:4px 16px 16px 16px; }
.message.error .msg-bubble { background:rgba(239,68,68,0.12); color:var(--danger); border:1px solid rgba(239,68,68,0.3); border-radius:4px 16px 16px 16px; }

.msg-meta { font-size:10px; color:var(--text-muted); margin-top:4px; font-family:var(--font-mono); }

.typing-indicator { display:flex; gap:4px; padding:12px 16px; }
.typing-dot {
  width:7px; height:7px; border-radius:50%; background:var(--text-muted);
  animation:typing 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay:0.2s; }
.typing-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes typing { 0%,80%,100%{transform:scale(0.8);opacity:0.5} 40%{transform:scale(1.1);opacity:1} }

.input-area {
  padding:16px 28px 24px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.input-row { display:flex; gap:10px; align-items:flex-end; }
.chat-textarea {
  flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius);
  padding:12px 16px; color:var(--text); font-family:var(--font-body); font-size:14px;
  resize:none; min-height:48px; max-height:160px; transition:var(--transition); line-height:1.5;
}
.chat-textarea:focus { outline:none; border-color:var(--primary); }
.btn-send {
  flex-shrink:0; width:48px; height:48px; border-radius:var(--radius);
  background:var(--primary); color:#0B0F19; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:20px;
  transition:var(--transition);
}
.btn-send:hover { opacity:0.88; transform:scale(1.04); }
.btn-send:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

.btn-clear-chat {
  font-size:11px; color:var(--text-muted); background:none; border:none; cursor:pointer;
  font-family:var(--font-mono); margin-top:8px; transition:var(--transition);
}
.btn-clear-chat:hover { color:var(--danger); }

/* AI not configured */
.ai-not-configured {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  flex:1; gap:16px; padding:40px;
}
.ai-not-configured .icon { font-size:56px; }
.ai-not-configured h2 { font-family:var(--font-heading); font-size:20px; }
.ai-not-configured p { color:var(--text-muted); font-size:14px; text-align:center; }
.btn-primary {
  display:inline-flex; align-items:center; gap:6px; padding:11px 22px;
  background:var(--primary); color:#0B0F19; border:none; border-radius:var(--radius-sm);
  font-weight:700; font-size:14px; cursor:pointer; transition:var(--transition); text-decoration:none; font-family:var(--font-heading);
}
.btn-primary:hover { opacity:0.88; }

.messages-area::-webkit-scrollbar { width:4px; }
.messages-area::-webkit-scrollbar-track { background:transparent; }
.messages-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<nav>
  <div class="nav-logo">
    <div class="nav-logo-dot"></div>
    <a href="delhub-dashboard.html" style="color:inherit;text-decoration:none;">DelHub / v1.0</a>
  </div>
  <div class="nav-context" id="nav-context"></div>
  <div class="nav-links">
    <a href="delhub-settings.html" class="nav-icon" title="Paramètres"><span class="nav-icon-symbol">⚙</span></a>
  </div>
</nav>
<div class="layout">
  <aside class="sidebar" id="delhub-sidebar"></aside>
  <div class="main-col">
  <main class="main">
    <div class="chat-wrapper" id="chatWrapper">
      <!-- Content injected by JS -->
    </div>
  </main>
  </div>
</div>

<script>
(function() {
  if (typeof DELHUB === 'undefined') return;

  var SESSION_KEY = 'delhub_ai_chat_history';
  var role = DELHUB.getEffectiveRole();
  var aiOk = DELHUB.isAIEnabled();
  var profile = DELHUB.getProfile();
  var wrapper = document.getElementById('chatWrapper');

  var SUGGESTIONS = [
    'Analyse mon pipeline CRM',
    'État de mes SLA',
    'Synthèse business mensuelle',
    'Recommandations incidents'
  ];

  var SYSTEM_PROMPT = 'Tu es un assistant IA expert en gestion de projet, delivery, business et commercial. Tu as accès aux données de l\'utilisateur. Réponds en français de façon professionnelle et actionnable.';

  function buildContext() {
    var ctx = 'Utilisateur : ' + (profile.name || 'Inconnu') + ', Rôle : ' + role + '.\n';
    if (['sales','business','god','head'].includes(role)) {
      try {
        var crmStats = DELHUB.getCRMStats();
        ctx += 'CRM : ' + crmStats.totalOpportunities + ' opportunités, pipeline ' + crmStats.pipelineValue.toLocaleString('fr-FR') + '€, taux de réussite ' + crmStats.winRate + '%.\n';
      } catch(e) {}
    }
    if (['business','delivery','god','head'].includes(role)) {
      try {
        var contracts = DELHUB.getContracts();
        var active = contracts.filter(function(c){ return c.status === 'active'; });
        var totalVal = active.reduce(function(s,c){ return s + (Number(c.value)||0); }, 0);
        ctx += 'Contrats : ' + contracts.length + ' total, ' + active.length + ' actifs, valeur ' + totalVal.toLocaleString('fr-FR') + '€.\n';
      } catch(e) {}
    }
    if (['delivery','god','head'].includes(role)) {
      try {
        var kpis = DELHUB.getDashboardKPIs('delivery').delivery || {};
        ctx += 'Delivery : SLA compliance ' + (kpis.slaCompliance||100) + '%, ' + (kpis.openIncidents||0) + ' incidents ouverts, ' + (kpis.p1Incidents||0) + ' P1, ' + (kpis.upcomingReleases||0) + ' releases à venir.\n';
      } catch(e) {}
    }
    try {
      var pnl = DELHUB.getPnL();
      var revenue = pnl.reduce(function(s,e){ return s + (Number(e.revenue)||0); }, 0);
      var costs   = pnl.reduce(function(s,e){ return s + (Number(e.costs)||0); }, 0);
      var margin  = pnl.reduce(function(s,e){ return s + (Number(e.margin)||0); }, 0);
      ctx += 'P&L : Revenus ' + revenue.toLocaleString('fr-FR') + '€, Coûts ' + costs.toLocaleString('fr-FR') + '€, Marge ' + margin.toLocaleString('fr-FR') + '€.\n';
    } catch(e) {}
    return ctx;
  }

  function getHistory() {
    try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || '[]'); } catch(e) { return []; }
  }

  function saveHistory(h) {
    try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(h)); } catch(e) {}
  }

  function formatTime(iso) {
    try { return new Date(iso).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }); } catch(e) { return ''; }
  }

  if (!aiOk) {
    wrapper.innerHTML = '<div class="ai-not-configured">' +
      '<div class="icon">🤖</div>' +
      '<h2>Assistant IA non configuré</h2>' +
      '<p>Veuillez configurer un fournisseur IA pour utiliser le centre IA.</p>' +
      '<a href="delhub-settings.html" class="btn-primary">⚙ Configurer l\'IA</a></div>';
    return;
  }

  wrapper.innerHTML =
    '<div class="chat-header">' +
      '<div class="chat-title">🤖 Assistant IA DelHub</div>' +
      '<div class="chat-sub">Contexte : ' + (profile.name || 'Utilisateur') + ' — ' + (DELHUB.ROLES[role]?.label || role) + '</div>' +
    '</div>' +
    '<div class="suggestions-bar" id="suggestionsBar"></div>' +
    '<div class="messages-area" id="messagesArea"></div>' +
    '<div class="input-area">' +
      '<div class="input-row">' +
        '<textarea class="chat-textarea" id="chatInput" placeholder="Posez votre question..." rows="1"></textarea>' +
        '<button class="btn-send" id="btnSend" title="Envoyer">➤</button>' +
      '</div>' +
      '<div style="display:flex;justify-content:flex-end">' +
        '<button class="btn-clear-chat" onclick="clearChat()">Effacer la conversation</button>' +
      '</div>' +
    '</div>';

  // Suggestions
  var sugBar = document.getElementById('suggestionsBar');
  SUGGESTIONS.forEach(function(s) {
    var chip = document.createElement('button');
    chip.className = 'suggestion-chip';
    chip.textContent = s;
    chip.addEventListener('click', function(){ sendMessage(s); });
    sugBar.appendChild(chip);
  });

  // Render history
  var history = getHistory();
  renderAllMessages();

  // Input auto-resize
  var input = document.getElementById('chatInput');
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 160) + 'px';
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  document.getElementById('btnSend').addEventListener('click', send);

  function send() {
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    sendMessage(text);
  }

  function renderAllMessages() {
    var area = document.getElementById('messagesArea');
    if (!area) return;
    area.innerHTML = '';
    history.forEach(function(msg) { appendMessageDOM(msg); });
    scrollBottom();
  }

  function appendMessageDOM(msg) {
    var area = document.getElementById('messagesArea');
    if (!area) return;
    var div = document.createElement('div');
    div.className = 'message ' + msg.role;
    div.innerHTML = '<div class="msg-bubble">' + escapeHtml(msg.content) + '</div>' +
      '<div class="msg-meta">' + formatTime(msg.ts) + '</div>';
    area.appendChild(div);
  }

  function appendTyping() {
    var area = document.getElementById('messagesArea');
    var div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typingIndicator';
    div.innerHTML = '<div class="msg-bubble" style="padding:8px 16px"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    area.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    var t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function scrollBottom() {
    var area = document.getElementById('messagesArea');
    if (area) area.scrollTop = area.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  async function sendMessage(text) {
    var btn = document.getElementById('btnSend');
    var inp = document.getElementById('chatInput');
    if (btn) btn.disabled = true;
    if (inp) inp.disabled = true;

    var userMsg = { role:'user', content: text, ts: new Date().toISOString() };
    history.push(userMsg);
    appendMessageDOM(userMsg);
    appendTyping();
    scrollBottom();

    var context = buildContext();
    var systemWithCtx = SYSTEM_PROMPT + '\n\nDonnées actuelles :\n' + context;

    try {
      var result = await DELHUB.callAI(systemWithCtx, text);
      removeTyping();
      var aiMsg = { role:'ai', content: result, ts: new Date().toISOString() };
      history.push(aiMsg);
      appendMessageDOM(aiMsg);
    } catch(err) {
      removeTyping();
      var errMsg = { role:'error', content: 'Erreur : ' + err.message, ts: new Date().toISOString() };
      history.push(errMsg);
      appendMessageDOM(errMsg);
    }

    saveHistory(history);
    scrollBottom();
    if (btn) btn.disabled = false;
    if (inp) { inp.disabled = false; inp.focus(); }
  }

  window.clearChat = function() {
    if (!confirm('Effacer toute la conversation ?')) return;
    history.length = 0;
    saveHistory(history);
    renderAllMessages();
  };
})();
</script>
</body>
</html>
