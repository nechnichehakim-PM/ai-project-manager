<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Hub — Kanban</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes/pmhub-theme.css">
<script src="pmhub-data.js"></script>
<script src="pmhub-nav-context.js"></script>
<script src="pmhub-sidebar.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(212,175,100,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,100,0.02) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);background:rgba(6,10,13,0.92);backdrop-filter:blur(24px);}
.nav-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.22em;color:var(--accent);text-transform:uppercase;}
.nav-links{display:flex;gap:8px;align-items:center;}
.nav-links a{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;padding:7px 13px;border-radius:5px;transition:all .2s;}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.nav-links a.active{color:var(--accent);background:rgba(99,210,180,0.07);}

.kanban-bar{display:flex;align-items:center;gap:16px;padding:12px 48px;border-bottom:1px solid var(--border);background:rgba(13,17,23,0.95);position:sticky;top:65px;z-index:90;flex-wrap:wrap;}
.kanban-bar .proj-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);}
.kanban-bar select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;min-width:260px;outline:none;cursor:pointer;}
.kanban-bar select:focus{border-color:var(--accent);}
.kanban-bar .badge{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;letter-spacing:.08em;}
.kanban-bar .link-gantt{font-size:11px;color:var(--accent);text-decoration:none;margin-left:auto;}
.kanban-bar .link-gantt:hover{text-decoration:underline;}

.main-kanban{padding:28px 48px;position:relative;z-index:1;}
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;min-height:calc(100vh - 220px);}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;min-width:0;}
.kanban-col-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.kanban-col-title{font-size:13px;font-weight:700;}
.kanban-col-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);background:var(--surface2);padding:2px 8px;border-radius:10px;}
.kanban-col-cards{padding:12px;flex:1;overflow-y:auto;min-height:120px;}
.kanban-col-cards.droppable{drop-target:true;}
.kanban-col-cards.drag-over{background:rgba(99,210,180,0.06);border:1px dashed rgba(99,210,180,0.3);border-radius:8px;}
.kanban-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px;cursor:grab;transition:all .18s;}
.kanban-card:hover{border-color:rgba(99,210,180,0.3);}
.kanban-card:last-child{margin-bottom:0;}
.kanban-card.dragging{opacity:0.5;cursor:grabbing;}
.kanban-card-title{font-size:12px;font-weight:600;margin-bottom:6px;line-height:1.3;}
.kanban-card-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.kanban-card-owner{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);}
.kanban-card-progress{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);}
.kanban-card-type{margin-left:auto;font-size:10px;}
.toast-k{position:fixed;bottom:28px;right:28px;z-index:400;background:var(--surface);border:1px solid var(--accent);border-radius:8px;padding:12px 18px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;}
.toast-k.show{transform:translateY(0);opacity:1;}
.ai-float-btn{position:fixed;bottom:28px;right:28px;z-index:350;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#4cbda0);color:#060a0d;font-size:24px;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 8px 28px rgba(99,210,180,0.35);border:1px solid rgba(99,210,180,0.4);transition:transform .2s;}
.ai-float-btn:hover{transform:scale(1.08);}
@media(max-width:1100px){.kanban-board{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.kanban-board{grid-template-columns:1fr;} nav{padding:14px 20px;} .main-kanban{padding:20px;} .kanban-bar{padding:12px 20px;}}
</style>
</head>
<body>
<nav>
  <a href="pm-hub.html" class="nav-back" title="Retour">← Retour</a>
  <div class="nav-logo"><a href="pm-hub.html" style="color:inherit;text-decoration:none;">PM Hub</a></div>
  <div class="nav-context" id="nav-context"></div>
  <div class="nav-links">
    <a href="pm-hub.html" class="nav-cta">+ Nouveau projet</a>
    <a href="pm-hub-settings.html" class="nav-icon" title="Paramètres">⚙</a>
  </div>
</nav>

<div class="layout" style="display:grid;grid-template-columns:260px 1fr;min-height:100vh;padding-top:65px;">
  <aside class="sidebar" id="pmhub-sidebar"></aside>
  <div style="display:flex;flex-direction:column;min-height:0;">
<div class="kanban-bar">
  <span class="proj-label">Projet :</span>
  <select id="projectSelect" onchange="switchProject(this.value)"></select>
  <span class="badge" id="projectBadge" style="background:rgba(99,210,180,.1);color:var(--accent);"></span>
  <a href="#" id="linkGantt" class="link-gantt">📅 Voir le Gantt →</a>
</div>

<main class="main-kanban">
  <div class="kanban-board" id="kanbanBoard"></div>
</main>
</div>
</div>

<div class="toast-k" id="toastK"></div>
<a href="pm-hub-ai.html?from=Kanban" class="ai-float-btn" id="aiFloatBtn" title="Assistant IA">🤖</a>

<script>
const KANBAN_COLUMNS = [
  { id: 'todo',       label: 'À faire',      color: 'var(--text-muted)' },
  { id: 'in_progress', label: 'En cours',     color: 'var(--accent3)' },
  { id: 'review',     label: 'En revue',     color: 'var(--accent2)' },
  { id: 'done',       label: 'Terminé',      color: 'var(--success)' },
];

let activeProjectId = null;
let tasks = [];
let draggedCard = null;
let dragStatus = null;

function getTasksKey(projectId) {
  return 'pmhub_tasks_' + projectId;
}

function loadTasks(projectId) {
  try {
    const raw = localStorage.getItem(getTasksKey(projectId));
    tasks = raw ? JSON.parse(raw) : [];
    tasks.forEach(t => {
      if (t.type === 'group') return;
      if (t.kanbanStatus == null) {
        const p = t.progress || 0;
        t.kanbanStatus = p >= 100 ? 'done' : p > 0 ? 'in_progress' : 'todo';
      }
    });
  } catch (e) { tasks = []; }
}

function saveTasks() {
  if (!activeProjectId) return;
  localStorage.setItem(getTasksKey(activeProjectId), JSON.stringify(tasks));
}

function getTasksByStatus() {
  const items = tasks.filter(t => t.type !== 'group');
  return KANBAN_COLUMNS.map(col => ({
    ...col,
    tasks: items.filter(t => (t.kanbanStatus || 'todo') === col.id),
  }));
}

function render() {
  const board = document.getElementById('kanbanBoard');
  board.innerHTML = '';
  const cols = getTasksByStatus();
  cols.forEach(col => {
    const colEl = document.createElement('div');
    colEl.className = 'kanban-col';
    colEl.dataset.status = col.id;
    colEl.innerHTML = `
      <div class="kanban-col-hdr">
        <span class="kanban-col-title" style="color:${col.color}">${col.label}</span>
        <span class="kanban-col-count">${col.tasks.length}</span>
      </div>
      <div class="kanban-col-cards" data-status="${col.id}"></div>
    `;
    const cardsZone = colEl.querySelector('.kanban-col-cards');
    col.tasks.forEach(t => {
      const card = document.createElement('div');
      card.className = 'kanban-card';
      card.draggable = true;
      card.dataset.id = t.id;
      card.dataset.status = col.id;
      const icon = t.type === 'milestone' ? '💎 ' : '';
      card.innerHTML = `
        <div class="kanban-card-title">${icon}${(t.name||'').replace(/</g,'&lt;')}</div>
        <div class="kanban-card-meta">
          <span class="kanban-card-owner">${(t.owner||'—')}</span>
          <span class="kanban-card-progress">${t.progress != null ? t.progress + '%' : '—'}</span>
          <span class="kanban-card-type">${t.type==='milestone'?'Jalon':''}</span>
        </div>
      `;
      card.style.borderLeftColor = t.color || 'var(--accent)';
      card.style.borderLeftWidth = '3px';
      card.style.borderLeftStyle = 'solid';
      card.addEventListener('dragstart', e => {
        draggedCard = t.id;
        dragStatus = col.id;
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', t.id);
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      card.addEventListener('click', () => { window.location.href = 'pm-hub-gantt.html?project=' + activeProjectId; });
      cardsZone.appendChild(card);
    });
    cardsZone.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      cardsZone.classList.add('drag-over');
    });
    cardsZone.addEventListener('dragleave', () => cardsZone.classList.remove('drag-over'));
    cardsZone.addEventListener('drop', e => {
      e.preventDefault();
      cardsZone.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/plain');
      if (!taskId || dragStatus === col.id) return;
      const task = tasks.find(x => String(x.id) === String(taskId));
      if (!task) return;
      task.kanbanStatus = col.id;
      if (col.id === 'done') task.progress = 100;
      else if (col.id === 'todo') task.progress = 0;
      saveTasks();
      render();
      showToast('Tâche déplacée → ' + col.label);
    });
    board.appendChild(colEl);
  });
}

function showToast(msg) {
  const t = document.getElementById('toastK');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 2200);
}

async function loadProjects() {
  const projects = typeof PMHUB !== 'undefined' ? PMHUB.getProjects() : [];
  const sel = document.getElementById('projectSelect');
  sel.innerHTML = '';
  if (!projects.length) {
    sel.innerHTML = '<option>Aucun projet</option>';
    return;
  }
  const paramId = PMHUB.getParam('project');
  projects.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.ref + ' — ' + p.name;
    if (String(p.id) === String(paramId)) opt.selected = true;
    sel.appendChild(opt);
  });
  activeProjectId = parseInt(sel.value);
  await switchProject(activeProjectId);
}

async function switchProject(id) {
  activeProjectId = parseInt(id);
  const p = typeof PMHUB !== 'undefined' ? PMHUB.getProjectById(id) : null;
  const badge = document.getElementById('projectBadge');
  const linkGantt = document.getElementById('linkGantt');
  if (p) {
    const labels = { active: 'En cours', risk: 'À risque', hold: 'En attente', closed: 'Clôturé' };
    badge.textContent = labels[p.status] || p.status;
    badge.style.background = p.status === 'active' ? 'rgba(99,210,180,.1)' : p.status === 'risk' ? 'rgba(224,112,112,.15)' : 'rgba(107,120,133,.15)';
    badge.style.color = p.status === 'active' ? 'var(--accent)' : p.status === 'risk' ? 'var(--danger)' : 'var(--text-muted)';
  }
  linkGantt.href = 'pm-hub-gantt.html?project=' + activeProjectId;
  const ab = document.getElementById('aiFloatBtn');
  if (ab) ab.href = 'pm-hub-ai.html?from=Kanban' + (activeProjectId ? '&project=' + activeProjectId : '');
  loadTasks(activeProjectId);
  render();
}

if (typeof PMHUB !== 'undefined') {
  loadProjects();
} else {
  document.getElementById('projectSelect').innerHTML = '<option>Chargez le hub</option>';
  document.getElementById('kanbanBoard').innerHTML = '<p style="padding:40px;color:var(--text-muted);">Aucune donnée. Ouvrez depuis le Dashboard.</p>';
}
</script>
<div id="ai-suggestions-bar"></div>
<script src="pmhub-ai-suggestions.js"></script>
</body>
</html>
